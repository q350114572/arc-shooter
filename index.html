// ============================================================
// 场地绘制（升级为科技风格）
// ============================================================
function drawField() {
    // 使用球场贴图作为背景
    if (FIELD_IMG.complete && FIELD_IMG.naturalWidth > 0) {
        // 绘制深色背景（超出球场区域的部分）
        ctx.fillStyle = '#080c18';
        ctx.fillRect(0, 0, W, VH);
        
        // 绘制球场贴图（拉伸到场地范围）
        ctx.drawImage(FIELD_IMG, 0, 0, W, VH);
        // 遮盖右下角水印
        ctx.fillStyle = '#2a6b3a';
        ctx.fillRect(W - 110, VH - 28, 110, 28);
    } else {
        // 降级：用纯色填充
        ctx.fillStyle = '#2d8c3e';
        ctx.fillRect(0, 0, W, VH);
    }
    
    // ========== 球门区域（保持发光效果）==========
    ctx.fillStyle = 'rgba(0, 180, 255, 0.08)'; 
    ctx.fillRect(GOAL.left, GOAL.top, CFG.GOAL_W, CFG.GOAL_D);
    
    // 球门网格
    ctx.strokeStyle = 'rgba(0, 180, 255, 0.12)'; 
    ctx.lineWidth = 0.5;
    for (let x = GOAL.left; x <= GOAL.right; x += 10) { 
        ctx.beginPath(); ctx.moveTo(x, GOAL.top); ctx.lineTo(x, GOAL.bottom); ctx.stroke(); 
    }
    for (let y = GOAL.top; y <= GOAL.bottom; y += 10) { 
        ctx.beginPath(); ctx.moveTo(GOAL.left, y); ctx.lineTo(GOAL.right, y); ctx.stroke(); 
    }
    
    // 球门框 - 发光
    ctx.strokeStyle = '#ffffff'; 
    ctx.lineWidth = 3; 
    ctx.shadowColor = '#00b4ff'; 
    ctx.shadowBlur = 12;
    ctx.beginPath(); 
    ctx.moveTo(GOAL.left, GOAL.bottom); 
    ctx.lineTo(GOAL.left, GOAL.top); 
    ctx.lineTo(GOAL.right, GOAL.top); 
    ctx.lineTo(GOAL.right, GOAL.bottom); 
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 球门上方 LIDEAI 白色立体字
    ctx.save();
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0, 100, 150, 0.5)';
    ctx.fillText('LIDEAI', W / 2 + 1, GOAL.top - 12 + 1);
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = '#00d4ff';
    ctx.shadowBlur = 8;
    ctx.fillText('LIDEAI', W / 2, GOAL.top - 12);
    ctx.shadowBlur = 0;
    ctx.restore();
}

// ============================================================
// 游戏逻辑
// ============================================================
function resetPos() {
    hasBall = false; 
    keeperHasBall = false;
    ballKicked = false;
    // 玩家初始位置在场地底部
    player = new Player(W / 2, FIELD.bottom - 100);
    // 10个AI随机均匀分布在球场上
    const minY = PENALTY.bottom + 40;
    const maxY = FIELD.bottom - 200;
    const rangeY = maxY - minY;
    const rangeX = FIELD.right - FIELD.left - 60;
    const startX = FIELD.left + 30;
    const MIN_SPACING = 130;
    const positions = [];
    for (let i = 0; i < 10; i++) {
        const segY = minY + (rangeY / 10) * i + Math.random() * (rangeY / 10);
        const segX = startX + Math.random() * rangeX;
        positions.push({ x: segX, y: segY });
    }
    // 推开重叠位置，确保最小间距
    for (let iter = 0; iter < 30; iter++) {
        for (let i = 0; i < positions.length; i++) {
            for (let j = i + 1; j < positions.length; j++) {
                const dx = positions[i].x - positions[j].x;
                const dy = positions[i].y - positions[j].y;
                const d = Math.sqrt(dx * dx + dy * dy) || 1;
                if (d < MIN_SPACING) {
                    const push = (MIN_SPACING - d) * 0.5;
                    positions[i].x += (dx / d) * push;
                    positions[i].y += (dy / d) * push;
                    positions[j].x -= (dx / d) * push;
                    positions[j].y -= (dy / d) * push;
                }
            }
        }
    }
    for (const p of positions) {
        p.x = Math.max(FIELD.left + 30, Math.min(FIELD.right - 30, p.x));
        p.y = Math.max(minY, Math.min(maxY, p.y));
    }
    const types = ['marker', 'marker', 'interceptor', 'interceptor', 'interceptor', 'interceptor', 'interceptor', 'interceptor', 'free', 'free'];
    const slowIndices = new Set();
    while (slowIndices.size < 3) slowIndices.add(Math.floor(Math.random() * 10));
    ais = positions.map((p, i) => new AI(p.x, p.y, types[i], slowIndices.has(i)));
    for (let i = 0; i < ais.length; i++) ais[i].setAIIndex(i);
    keeper = new Keeper(W / 2, GOAL.cy);
    ball = new Ball(W / 2, FIELD.bottom - 100);
    // 重置摄像机
    camera.y = VH - H; // 初始时摄像机在底部，看向玩家
    camera.targetY = VH - H;
}

function pickup() {
    if (hasBall || keeperHasBall || ballKicked) return; // 踢出后不自动吸附
    const dx = ball.x - player.x, dy = ball.y - player.y;
    if (Math.sqrt(dx * dx + dy * dy) < CFG.PICKUP + player.r) { hasBall = true; player.angle = Math.atan2(dy, dx); }
}

function tackle() {
    if (!hasBall) return;
    for (const a of ais) {
        const dx = player.x - a.x, dy = player.y - a.y, d = Math.sqrt(dx * dx + dy * dy);
        if (d < CFG.TACKLE_D) {
            const ap = Math.atan2(dy, dx);
            let df = Math.abs(ap - a.angle);
            if (df > Math.PI) df = Math.PI * 2 - df;
            if (df < CFG.TACKLE_A) { hasBall = false; ballKicked = false; ball.bounce(); return; }
        }
    }
}

// 足球与所有防守球员碰撞反弹
function ballBounceOffDefenders() {
    if (hasBall || keeperHasBall) return;
    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (speed < 0.5) return; // 球几乎静止时不检测
    
    // 与AI球员碰撞
    for (const a of ais) {
        const dx = ball.x - a.x, dy = ball.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = ball.r + a.r + 5;
        if (dist < minDist && dist > 0) {
            // 反弹方向：从AI中心到球的方向
            const nx = dx / dist, ny = dy / dist;
            const dot = ball.vx * nx + ball.vy * ny;
            ball.vx -= 2 * dot * nx;
            ball.vy -= 2 * dot * ny;
            // 稍微加速反弹
            ball.vx *= 1.1;
            ball.vy *= 1.1;
            // 把球推出碰撞范围
            ball.x = a.x + nx * (minDist + 1);
            ball.y = a.y + ny * (minDist + 1);
            // 碰撞粒子特效
            for (let i = 0; i < 6; i++) {
                const ea = Math.random() * Math.PI * 2;
                const es = 1 + Math.random() * 3;
                shootEffects.push({ x: ball.x, y: ball.y, vx: Math.cos(ea)*es, vy: Math.sin(ea)*es, life: 0.8, size: 2+Math.random()*3 });
            }
            screenShake = Math.max(screenShake, 2);
            break; // 一帧只处理一次碰撞
        }
    }
    
    // 与守门员碰撞（守门员不抱球时也反弹）
    if (!keeperHasBall) {
        const dx = ball.x - keeper.x, dy = ball.y - keeper.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = ball.r + keeper.r + 3;
        if (dist < minDist && dist > 0) {
            const nx = dx / dist, ny = dy / dist;
            const dot = ball.vx * nx + ball.vy * ny;
            ball.vx -= 2 * dot * nx;
            ball.vy -= 2 * dot * ny;
            ball.vx *= 1.05;
            ball.vy *= 1.05;
            ball.x = keeper.x + nx * (minDist + 1);
            ball.y = keeper.y + ny * (minDist + 1);
            for (let i = 0; i < 8; i++) {
                const ea = Math.random() * Math.PI * 2;
                const es = 1 + Math.random() * 3;
                shootEffects.push({ x: ball.x, y: ball.y, vx: Math.cos(ea)*es, vy: Math.sin(ea)*es, life: 0.8, size: 2+Math.random()*3 });
            }
            screenShake = Math.max(screenShake, 2.5);
        }
    }
}

function doShoot() {
    if (!inp.shoot) return;
    
    // 情况1：持球射门
    if (hasBall) {
        const pw = isCurve && energy >= 30 ? 26 : 21;
        let shootAngle = player.angle;
        const goalCenterX = (GOAL.left + GOAL.right) / 2;
        const goalDir = Math.atan2(GOAL.cy - player.y, goalCenterX - player.x);
        let angleDiff = shootAngle - goalDir;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        if (Math.abs(angleDiff) > Math.PI / 2) shootAngle = goalDir;
        
        if (isCurve && energy >= 30) { energy -= 30; showPopup('弧线射门!', player.x, player.y - 35, '#ff44ff'); }
        ball.shoot(shootAngle, pw);
        ballKicked = true;
        screenShake = 4;
        addShootEffect(ball.x, ball.y);
        inp.shoot = false;
        return;
    }
    
    // 情况2：球已踢出且在附近，直接补射（不需要先吸附）
    if (ballKicked && !keeperHasBall) {
        const dx = ball.x - player.x, dy = ball.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const ballSpeed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
        // 球在玩家附近且球速不高（停球或慢速时）
        if (dist < CFG.PICKUP + player.r + 10 && ballSpeed < 6) {
            const pw = isCurve && energy >= 30 ? 24 : 19;
            const goalCenterX = (GOAL.left + GOAL.right) / 2;
            const shootAngle = Math.atan2(GOAL.cy - player.y, goalCenterX - player.x);
            ball.shoot(shootAngle, pw);
            screenShake = 3;
            addShootEffect(ball.x, ball.y);
            showPopup('补射!', ball.x, ball.y - 25, '#00ccff');
            inp.shoot = false;
            return;
        }
    }
}

// 射门闪光特效粒子
let shootEffects = [];
function addShootEffect(x, y) {
    for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = 2 + Math.random() * 4;
        shootEffects.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, size: 3 + Math.random()*4 });
    }
}
function updateShootEffects() {
    for (let i = shootEffects.length - 1; i >= 0; i--) {
        const e = shootEffects[i];
        e.x += e.vx; e.y += e.vy;
        e.life -= 0.06;
        if (e.life <= 0) shootEffects.splice(i, 1);
    }
}
function drawShootEffects() {
    for (const e of shootEffects) {
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size * e.life, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0, 220, 255, ${e.life * 0.8})`;
        ctx.fill();
    }
}

// 屏幕震动系统
let screenShake = 0;


let goalCooldown = false;
function goalScored() {
    if (goalCooldown) return; // 防止重复计分
    goalCooldown = true;
    score++;
    // 进球时停止计时
    timerStopped = true;
    currentTime = Date.now() - roundStartTime;
    // 球进门后立即停止运动
    ball.vx = 0; ball.vy = 0;
    document.getElementById('sVal').textContent = score + ' / 1';
    showPopup('⚽ 进球!', W / 2, MID_Y - 30, '#ffd700');
    
    // 播放进球特效视频
    const overlay = document.getElementById('goalOverlay');
    if (overlay) {
        overlay.style.display = 'flex';
        const vid = document.createElement('video');
        vid.src = GOAL_ANIM_SRC;
        vid.playsInline = true;
        vid.muted = true;
        vid.style.cssText = 'max-width:90%;max-height:90%;border-radius:12px;box-shadow:0 0 40px rgba(255,215,0,0.5);';
        vid.oncanplay = () => { vid.play().catch(() => {}); };
        vid.onended = () => {
            overlay.style.display = 'none';
            overlay.innerHTML = '';
            afterGoalAnim();
        };
        overlay.innerHTML = '';
        overlay.appendChild(vid);
        vid.load();
        // 超时保护：5秒后强制关闭
        setTimeout(() => {
            if (overlay.style.display !== 'none') {
                overlay.style.display = 'none';
                overlay.innerHTML = '';
                afterGoalAnim();
            }
        }, 5500);
    } else {
        afterGoalAnim();
    }
}

function afterGoalAnim() {
    goalCooldown = false;
    if (score >= CFG.WIN) {
        gameOver = true;
        // 记录用时（进球时已冻结）
        const finalTime = currentTime > 0 ? currentTime : 0;
        const rankIdx = finalTime > 0 ? saveRanking(finalTime) : -1;
        document.getElementById('fsText').textContent = '用时: ' + formatTime(finalTime);
        renderRanking(rankIdx);
        document.getElementById('winModal').style.display = 'flex';
    } else {
        resetPos();
    }
}

// ============================================================
// 主循环
// ============================================================
// 玩家信息
let playerInfo = { name: '', phone: '', company: '' };
let gameStarted = false;

function validateAndStart() {
    const name = document.getElementById('regName').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const company = document.getElementById('regCompany').value.trim();
    const errEl = document.getElementById('regError');
    if (!name) { errEl.textContent = '请输入姓名'; errEl.style.display = 'block'; return; }
    if (!/^\d{11}$/.test(phone)) { errEl.textContent = '请输入11位手机号'; errEl.style.display = 'block'; return; }
    if (!company) { errEl.textContent = '请输入公司名称'; errEl.style.display = 'block'; return; }
    playerInfo = { name, phone, company };
    document.getElementById('regForm').style.display = 'none';
    document.getElementById('pName').textContent = name;
    roundStartTime = Date.now(); timerStopped = false;
    document.getElementById('tVal').textContent = '0.0s';
    if (!gameStarted) {
        init();
    } else {
        score = 0; gameOver = false; energy = 100; trails = [];
        roundStartTime = 0; currentTime = 0; timerStopped = false;
        document.getElementById('sVal').textContent = '0 / 1';
        document.getElementById('tVal').textContent = '--:--';
        resetPos();
    }
}

function init() {
    canvas = document.getElementById('gameCanvas'); 
    ctx = canvas.getContext('2d');
    initInput();
    gameStarted = true;
    document.getElementById('restartBtn').addEventListener('click', () => {
        score = 0; gameOver = false; energy = 100; trails = [];
        roundStartTime = 0; currentTime = 0; timerStopped = false;
        document.getElementById('sVal').textContent = '0 / 1';
        document.getElementById('tVal').textContent = '--:--';
        document.getElementById('winModal').style.display = 'none';
        document.getElementById('regForm').style.display = 'flex';
        document.getElementById('regName').value = '';
        document.getElementById('regPhone').value = '';
        document.getElementById('regCompany').value = '';
        document.getElementById('regError').style.display = 'none';
    });
    resetPos();
    requestAnimationFrame(loop);
}


function loop() {
    if (!gameOver) {
        player.update();
        ais.forEach(a => a.update(player, ball));
        if (keeperHasBall) { if (Date.now() - keeperHoldStart > CFG.K_HOLD) keeper.release(); }
        else keeper.update();
        updateTrails();
        updateShootEffects();
        const r = ball.update();
        if (r === 'goal' && !goalCooldown) goalScored();
        pickup(); tackle(); doShoot();
        ballBounceOffDefenders();
        // 更新摄像机
        updateCamera();
        // 屏幕震动衰减
        if (screenShake > 0) screenShake *= 0.85;
        if (screenShake < 0.3) screenShake = 0;
        // 更新计时器（进球后停止）
        if (roundStartTime > 0 && !timerStopped) {
            currentTime = Date.now() - roundStartTime;
            document.getElementById('tVal').textContent = formatTime(currentTime);
        }
        document.getElementById('eFill').style.width = energy + '%';
        const ef = document.getElementById('eFill');
        ef.style.background = energy >= 30 ? 'linear-gradient(90deg,#00b4ff,#00e5ff)' : 'linear-gradient(90deg,#cc4400,#ff6600)';
    }
    
    // 屏幕震动偏移
    const shakeX = screenShake > 0 ? (Math.random() - 0.5) * screenShake * 2 : 0;
    const shakeY = screenShake > 0 ? (Math.random() - 0.5) * screenShake * 2 : 0;
    
    ctx.save();
    ctx.translate(shakeX, shakeY);
    
    // 应用摄像机偏移（只影响游戏元素，不影响UI）
    ctx.save();
    ctx.translate(0, -camera.y);
    
    drawField();
    drawTrails();
    drawShootEffects();
    ball.draw();
    ais.forEach(a => a.draw());
    keeper.draw();
    player.draw();
    
    ctx.restore(); // 恢复摄像机偏移
    ctx.restore(); // 恢复屏幕震动
    requestAnimationFrame(loop);
}


// ============================================================
// 开场动画逻辑
// ============================================================
let introShown = true;

function resizeIntro() {
    const container = document.getElementById('introContainer');
    if (!container) return;
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / 480, vh / 800);
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'top center';
    const scaledH = 800 * scale;
    container.style.marginTop = Math.max(0, (vh - scaledH) / 2) + 'px';
}

function dismissIntro() {
    if (!introShown) return;
    introShown = false;
    const intro = document.getElementById('introScreen');
    if (intro) {
        intro.style.transition = 'opacity 0.5s';
        intro.style.opacity = '0';
        setTimeout(() => {
            intro.remove();
            // Show registration form
            document.getElementById('regForm').style.display = 'flex';
        }, 500);
    }
}

// Click/tap to dismiss intro and show form
document.addEventListener('DOMContentLoaded', () => {
    const introScreen = document.getElementById('introScreen');
    const introVideo = document.getElementById('introVideo');
    
    if (introScreen) {
        introScreen.addEventListener('click', dismissIntro);
        introScreen.addEventListener('touchend', (e) => { e.preventDefault(); dismissIntro(); });
    }
    
    // Auto-dismiss after video ends (with a small buffer for looping feel)
    if (introVideo) {
        introVideo.addEventListener('ended', () => {
            // Loop the video until user clicks
            introVideo.currentTime = 0;
            introVideo.play().catch(() => {});
        });
        // Also resize intro on load
        resizeIntro();
    }
});

window.addEventListener('resize', () => {
    if (introShown) resizeIntro();
});

// ============================================================
// 移动端自适应缩放
// ============================================================
function resizeGame() {
    const container = document.getElementById('gameContainer');
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / W, vh / H);
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'top center';
    // 垂直居中
    const scaledH = H * scale;
    container.style.marginTop = Math.max(0, (vh - scaledH) / 2) + 'px';
}
window.addEventListener('resize', resizeGame);
window.addEventListener('load', () => { 
    resizeGame(); 
    document.getElementById('regBtn').addEventListener('click', validateAndStart);
    ['regName','regPhone','regCompany'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') validateAndStart(); });
    });
});
</script>
