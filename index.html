<!DOCTYPE html>
<!--
================================================================================
弧线射手 - 科技足球（竖屏半场版）- 机甲守卫机器人版
================================================================================
升级内容：
- AI防守队员 → Q版机甲守卫机器人（白/银灰+蓝色发光+红色警示灯）
- 守门员 → 机甲守门员（白/蓝+金色光晕+蓝色发光眼睛）
- 足球 → 白蓝相间六边形纹理+光效拖尾+LIDEAI标识
- 球场 → 翠绿草坪+科技网格线+发光能量边界+LIDEAI球门字
- 玩家角色（10号少年）保持Q版卡通人物风格不变
================================================================================
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>弧线射手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #080c18;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameContainer { position: relative; transform-origin: top center; }
        #gameCanvas { display: block; border-radius: 4px; }

        /* === HUD === */
        #hud {
            position: absolute; top: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 8px; pointer-events: none; z-index: 10;
        }
        .hud-box {
            background: rgba(8,12,28,0.88);
            border: 1.5px solid rgba(0,180,255,0.45);
            border-radius: 8px; padding: 4px 10px;
            box-shadow: 0 0 10px rgba(0,180,255,0.15);
        }
        #pInfo { display: flex; align-items: center; gap: 7px; }
        #pAvatar {
            width: 38px; height: 38px; border-radius: 50%;
            border: 2px solid #00b4ff;
            box-shadow: 0 0 6px rgba(0,180,255,0.5);
            background: #0f1a30;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        #pName { color: #cde; font-size: 10px; font-weight: bold; }
        #pTitle { color: #00b4ff; font-size: 8px; }
        #eBar { width: 64px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; margin-top: 2px; overflow: hidden; }
        #eFill { height: 100%; width: 100%; background: linear-gradient(90deg,#00b4ff,#00e5ff); border-radius: 3px; box-shadow: 0 0 5px #00b4ff; transition: width .2s; }
        #timer { color: #fff; font-size: 18px; font-weight: bold; text-align: center; min-width: 58px; }
        #sPanel { text-align: center; }
        #sLabel { color: #6aa; font-size: 8px; }
        #sVal { color: #ffd700; font-size: 20px; font-weight: bold; text-shadow: 0 0 8px rgba(255,215,0,0.5); }

        /* === 弹出文字 === */
        #popups { position: absolute; top: 80px; left: 0; right: 0; pointer-events: none; z-index: 15; text-align: center; }
        .popup {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-weight: bold; animation: pop 1.1s ease-out forwards;
            pointer-events: none; white-space: nowrap;
        }
        @keyframes pop {
            0% { opacity:1; transform: translateX(-50%) translateY(0) scale(.5); }
            15% { opacity:1; transform: translateX(-50%) translateY(-8px) scale(1.2); }
            100% { opacity:0; transform: translateX(-50%) translateY(-55px) scale(.8); }
        }

        /* === 底部操控 === */
        #ctrls { position: absolute; bottom: 0; left: 0; right: 0; height: 150px; pointer-events: none; z-index: 10; }
        #joyArea { position: absolute; bottom: 15px; left: 15px; width: 100px; height: 100px; pointer-events: auto; }
        #joyBase {
            position: absolute; width: 100px; height: 100px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 2px solid rgba(0,180,255,0.25);
        }
        #joyArrows {
            position: absolute; width: 100px; height: 100px;
            color: rgba(0,180,255,0.35); font-size: 12px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1.1;
        }
        #joyKnob {
            position: absolute; width: 40px; height: 40px; border-radius: 50%;
            background: radial-gradient(circle,rgba(0,180,255,0.45),rgba(0,180,255,0.15));
            border: 2px solid rgba(0,180,255,0.55);
            top: 50%; left: 50%; transform: translate(-50%,-50%);
            box-shadow: 0 0 8px rgba(0,180,255,0.35);
        }
        #actBtns {
            position: absolute; bottom: 18px; right: 14px;
            display: flex; flex-direction: column; align-items: center; gap: 7px;
            pointer-events: auto;
        }
        .hex {
            width: 48px; height: 48px;
            background: linear-gradient(135deg,rgba(0,35,70,0.9),rgba(0,18,45,0.9));
            border: 2px solid rgba(0,180,255,0.4);
            clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            display: flex; align-items: center; justify-content: center;
            color: #00b4ff; font-size: 16px;
            box-shadow: 0 0 8px rgba(0,180,255,0.15);
            cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .hex:active { background: linear-gradient(135deg,rgba(0,70,140,0.9),rgba(0,35,70,0.9)); }
        #shootBtn {
            width: 62px; height: 62px; border-radius: 50%;
            background: linear-gradient(135deg,#001838,#002850);
            border: 2.5px solid rgba(0,180,255,0.65);
            color: #00e5ff; font-size: 14px; font-weight: bold;
            cursor: pointer; display: flex; align-items: center; justify-content: center; flex-direction: column;
            box-shadow: 0 0 15px rgba(0,180,255,0.3), inset 0 0 8px rgba(0,180,255,0.1);
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        #shootBtn:active { background: linear-gradient(135deg,#002a58,#004088); box-shadow: 0 0 22px rgba(0,180,255,0.5); }
        #shootBtn .sub { font-size: 8px; color: #6aa; }

        /* === 胜利弹窗 === */
        #winModal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(8,12,28,0.92); flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        #winModal h1 { color: #ffd700; font-size: 32px; text-shadow: 0 0 18px rgba(255,215,0,0.5); margin-bottom: 8px; }
        #winModal .fs { color: #cde; font-size: 16px; margin-bottom: 22px; }
        #restartBtn {
            background: linear-gradient(135deg,#003868,#005aaa); color: #fff;
            border: 2px solid #00b4ff; padding: 10px 32px; font-size: 15px;
            border-radius: 22px; cursor: pointer; box-shadow: 0 0 12px rgba(0,180,255,0.25);
        }

        @media (pointer: coarse) {
            #joyArea, #actBtns { pointer-events: auto; }
        }
    
/* 排行榜样式 */
#rankList { margin: 10px 0; width: 90%; max-width: 320px; }
#rankList .rank-item { 
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; margin: 3px 0; border-radius: 8px;
    font-size: 14px; color: #cde;
}
#rankList .rank-item:nth-child(1) { background: linear-gradient(90deg, rgba(255,215,0,0.2), transparent); border: 1px solid rgba(255,215,0,0.3); }
#rankList .rank-item:nth-child(2) { background: linear-gradient(90deg, rgba(192,192,192,0.15), transparent); border: 1px solid rgba(192,192,192,0.2); }
#rankList .rank-item:nth-child(3) { background: linear-gradient(90deg, rgba(205,127,50,0.15), transparent); border: 1px solid rgba(205,127,50,0.2); }
#rankList .rank-item .rank-pos { width: 28px; font-weight: bold; }
#rankList .rank-item .rank-name { flex: 1; color: #cde; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#rankList .rank-item .rank-time { font-family: monospace; font-size: 15px; color: #00e5ff; }
.rank-new { animation: rankFlash 1s ease 3; }
@keyframes rankFlash { 0%,100%{ box-shadow:none; } 50%{ box-shadow: 0 0 12px rgba(0,229,255,0.5); } }

    
/* === 开场动画 === */
#introScreen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10001; background: #080c18;
    display: flex; justify-content: center; align-items: flex-start;
    cursor: pointer; overflow: hidden;
}
#introContainer {
    position: relative; width: 480px; height: 800px;
    transform-origin: top center;
}
#introVideo {
    width: 100%; height: 100%; object-fit: cover;
    display: block; border-radius: 4px;
}
#introHint {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,0.7);
    font-size: 14px; animation: introPulse 1.5s ease-in-out infinite;
    pointer-events: none; text-shadow: 0 0 8px rgba(0,180,255,0.5);
}
@keyframes introPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
}

</style>
</head>
<body>


<!-- 开场动画 -->
<div id="introScreen">
    <div id="introContainer">
        <video id="introVideo" autoplay playsinline muted
               src="intro.mp4"></video>
        <div id="introHint">点击屏幕开始</div>
    </div>
</div>

<!-- 报名表单 -->
<div id="regForm" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;display:none;justify-content:center;align-items:center;background:rgba(8,12,28,0.97);">
    <div style="background:linear-gradient(135deg,#0a1628,#0f2240);border:2px solid rgba(0,180,255,0.5);border-radius:16px;padding:28px 24px;width:90%;max-width:360px;box-shadow:0 0 40px rgba(0,180,255,0.2);">
        <div style="text-align:center;margin-bottom:20px;">
            <div style="font-size:28px;margin-bottom:4px;">⚽</div>
            <h2 style="color:#ffd700;font-size:22px;text-shadow:0 0 12px rgba(255,215,0,0.4);margin:0 0 4px;">弧线射手</h2>
            <p style="color:#6aa;font-size:12px;margin:0;">填写信息开始挑战</p>
        </div>
        <div style="margin-bottom:14px;">
            <label style="color:#00b4ff;font-size:12px;display:block;margin-bottom:4px;">姓名 *</label>
            <input id="regName" type="text" placeholder="请输入姓名" maxlength="20" style="width:100%;padding:10px 12px;background:rgba(0,30,60,0.8);border:1.5px solid rgba(0,180,255,0.35);border-radius:8px;color:#cde;font-size:15px;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='rgba(0,180,255,0.7)'" onblur="this.style.borderColor='rgba(0,180,255,0.35)'" />
        </div>
        <div style="margin-bottom:14px;">
            <label style="color:#00b4ff;font-size:12px;display:block;margin-bottom:4px;">电话 *（11位数字）</label>
            <input id="regPhone" type="tel" placeholder="请输入11位手机号" maxlength="11" style="width:100%;padding:10px 12px;background:rgba(0,30,60,0.8);border:1.5px solid rgba(0,180,255,0.35);border-radius:8px;color:#cde;font-size:15px;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='rgba(0,180,255,0.7)'" onblur="this.style.borderColor='rgba(0,180,255,0.35)'" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
        </div>
        <div style="margin-bottom:18px;">
            <label style="color:#00b4ff;font-size:12px;display:block;margin-bottom:4px;">公司名称 *</label>
            <input id="regCompany" type="text" placeholder="请输入公司名称" maxlength="40" style="width:100%;padding:10px 12px;background:rgba(0,30,60,0.8);border:1.5px solid rgba(0,180,255,0.35);border-radius:8px;color:#cde;font-size:15px;outline:none;box-sizing:border-box;" onfocus="this.style.borderColor='rgba(0,180,255,0.7)'" onblur="this.style.borderColor='rgba(0,180,255,0.35)'" />
        </div>
        <div id="regError" style="color:#ff4444;font-size:12px;text-align:center;margin-bottom:8px;display:none;"></div>
        <button id="regBtn" style="width:100%;padding:12px;background:linear-gradient(135deg,#003868,#005aaa);color:#fff;border:2px solid #00b4ff;font-size:16px;font-weight:bold;border-radius:22px;cursor:pointer;box-shadow:0 0 12px rgba(0,180,255,0.25);">开始比赛</button>
    </div>
</div>

<!-- 进球特效视频覆盖层 -->
<div id="goalOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;display:none;pointer-events:none;background:rgba(0,0,0,0.7);justify-content:center;align-items:center;">
</div>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="480" height="800"></canvas>
        <div id="hud">
            <div class="hud-box" id="pInfo">
                <div id="pAvatar">⚽</div>
                <div>
                    <div id="pName">伊蒂雅 LIDE</div>
                    <div id="pTitle">弧线射手</div>
                    <div id="eBar"><div id="eFill"></div></div>
                </div>
            </div>
            <div class="hud-box" id="timer"><span id="tVal">--:--</span></div>
            <div class="hud-box" id="sPanel">
                <div id="sLabel">得分</div>
                <div id="sVal">0 / 3</div>
            </div>
        </div>
        <div id="popups"></div>
        <div id="ctrls">
            <div id="joyArea">
                <div id="joyBase"><div id="joyArrows">▲<br>◀▶<br>▼</div></div>
                <div id="joyKnob"></div>
            </div>
            <div id="actBtns">
                <div class="hex" id="sprintBtn">🏃</div>
                <div class="hex" id="curveBtn">🌀</div>
                <div id="shootBtn">射门<div class="sub">ACE</div></div>
            </div>
        </div>
        <div id="winModal">
            <h1>🏆 胜利！</h1>
            <div class="fs" id="fsText"></div>
            <div id="rankList"></div>
            <button id="restartBtn">再来一局</button>
        </div>
    </div>

<script>
// ============================================================
// Q版卡通人物绘制系统（玩家专用）
// ============================================================
/**
 * 绘制Q版卡通人物 - 玩家角色使用
 * @param {CanvasRenderingContext2D} ctx - 画布上下文
 * @param {number} x - 脚底中心X
 * @param {number} y - 脚底中心Y
 * @param {Object} config - 角色配置
 * @param {Object} animState - 动画状态 { animTime, moving }
 */
function drawCartoonCharacter(ctx, x, y, config, animState) {
    const { animTime, moving } = animState;
    const r = config.radius || 16;
    
    // 身体尺寸比例
    const headR = r * 0.95;
    const bodyH = r * 1.1;
    const bodyW = r * 0.85;
    const legH = r * 1.0;
    const armH = r * 0.8;
    const footH = r * 0.35;
    
    const baseX = x;
    const baseY = y;
    
    const animFreq = moving ? 10 : 2.5;
    const breathe = Math.sin(animTime * 3) * (moving ? 0.5 : 1.5);
    const runCycle = animTime * animFreq;
    
    const legSwing = moving ? Math.sin(runCycle) * 0.5 : 0;
    const armSwing = moving ? Math.sin(runCycle) * 0.45 : Math.sin(animTime * 2) * 0.08;
    const bodyLean = moving ? 3 : 0;
    
    const bodyCenterY = baseY - legH - bodyH / 2 - footH + breathe;
    const bodyCenterX = baseX + (moving ? 2 : 0);
    
    const skinColor = config.skinColor || '#ffcc99';
    const jerseyColor = config.jerseyColor;
    const jerseyAccent = config.jerseyAccent || null;
    const shortsColor = config.shortsColor;
    const sockColor = config.sockColor;
    const sockTopColor = config.sockTopColor || null;
    const shoeColor = config.shoeColor;
    const hairColor = config.hairColor;
    const number = config.number;
    const isKeeper = config.isKeeper;
    const glowColor = config.glowColor;
    
    ctx.save();
    
    // 阴影
    ctx.beginPath();
    ctx.ellipse(baseX, baseY + 2, r * 0.7, r * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
    ctx.fill();
    
    // === 后腿 ===
    const backLegX = baseX - bodyW * 0.25;
    const backLegY = baseY - footH;
    
    ctx.beginPath();
    ctx.moveTo(backLegX - 4, backLegY - legH * 0.55);
    ctx.lineTo(backLegX + 4, backLegY - legH * 0.55);
    ctx.lineTo(backLegX + 4, backLegY);
    ctx.lineTo(backLegX - 4, backLegY);
    ctx.closePath();
    ctx.fillStyle = sockColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    if (sockTopColor) {
        ctx.beginPath();
        ctx.moveTo(backLegX - 4.5, backLegY - legH * 0.55);
        ctx.lineTo(backLegX + 4.5, backLegY - legH * 0.55);
        ctx.lineTo(backLegX + 4.5, backLegY - legH * 0.55 + 5);
        ctx.lineTo(backLegX - 4.5, backLegY - legH * 0.55 + 5);
        ctx.closePath();
        ctx.fillStyle = sockTopColor;
        ctx.fill();
    }
    
    ctx.beginPath();
    ctx.ellipse(backLegX, backLegY - footH * 0.4, 5.5, footH * 0.55, 0.1, 0, Math.PI * 2);
    ctx.fillStyle = shoeColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    // === 后臂 ===
    const backArmX = bodyCenterX - bodyW * 0.7;
    const backArmY = bodyCenterY - bodyH * 0.15;
    const backArmSwing = -armSwing;
    
    ctx.save();
    ctx.translate(backArmX, backArmY);
    ctx.rotate(backArmSwing);
    
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.35, 3.5, armH * 0.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = jerseyAccent || jerseyColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, armH * 0.65, 3, 0, Math.PI * 2);
    ctx.fillStyle = skinColor;
    ctx.fill();
    
    ctx.restore();
    
    // === 身体 ===
    ctx.beginPath();
    ctx.ellipse(bodyCenterX, bodyCenterY, bodyW, bodyH, 0, 0, Math.PI * 2);
    ctx.fillStyle = jerseyColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    
    if (jerseyAccent) {
        ctx.beginPath();
        ctx.ellipse(bodyCenterX - bodyW * 0.65, bodyCenterY - bodyH * 0.55, bodyW * 0.45, bodyH * 0.35, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = jerseyAccent;
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(bodyCenterX + bodyW * 0.65, bodyCenterY - bodyH * 0.55, bodyW * 0.45, bodyH * 0.35, 0.3, 0, Math.PI * 2);
        ctx.fillStyle = jerseyAccent;
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(bodyCenterX - bodyW * 0.25, bodyCenterY - bodyH * 0.7);
        ctx.lineTo(bodyCenterX, bodyCenterY - bodyH * 0.35);
        ctx.lineTo(bodyCenterX + bodyW * 0.25, bodyCenterY - bodyH * 0.7);
        ctx.strokeStyle = jerseyAccent;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }
    
    ctx.beginPath();
    ctx.ellipse(bodyCenterX, bodyCenterY - bodyH * 0.7, bodyW * 0.35, bodyH * 0.15, 0, 0, Math.PI * 2);
    ctx.fillStyle = shortsColor;
    ctx.fill();
    
    if (number) {
        const numColor = isKeeper ? '#333' : (jerseyColor === '#ffffff' ? '#1a3a6e' : '#fff');
        ctx.fillStyle = numColor;
        ctx.font = `bold ${r * 0.9}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(number, bodyCenterX, bodyCenterY + 1);
    }
    
    // === 前腿 ===
    const frontLegX = baseX + bodyW * 0.25;
    const frontLegY = baseY - footH;
    const frontLegSwing = legSwing;
    
    ctx.beginPath();
    ctx.moveTo(frontLegX - 5, bodyCenterY + bodyH * 0.5);
    ctx.lineTo(frontLegX + 5, bodyCenterY + bodyH * 0.5);
    ctx.lineTo(frontLegX + 5, frontLegY - legH * 0.55);
    ctx.lineTo(frontLegX - 5, frontLegY - legH * 0.55);
    ctx.closePath();
    ctx.fillStyle = shortsColor;
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(frontLegX - 4, frontLegY - legH * 0.55);
    ctx.lineTo(frontLegX + 4, frontLegY - legH * 0.55);
    ctx.lineTo(frontLegX + 4, frontLegY);
    ctx.lineTo(frontLegX - 4, frontLegY);
    ctx.closePath();
    ctx.fillStyle = sockColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    if (sockTopColor) {
        ctx.beginPath();
        ctx.moveTo(frontLegX - 4.5, frontLegY - legH * 0.55);
        ctx.lineTo(frontLegX + 4.5, frontLegY - legH * 0.55);
        ctx.lineTo(frontLegX + 4.5, frontLegY - legH * 0.55 + 5);
        ctx.lineTo(frontLegX - 4.5, frontLegY - legH * 0.55 + 5);
        ctx.closePath();
        ctx.fillStyle = sockTopColor;
        ctx.fill();
    }
    
    ctx.beginPath();
    ctx.ellipse(frontLegX, frontLegY - footH * 0.4, 5.5, footH * 0.55, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = shoeColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    // === 前臂 ===
    const frontArmX = bodyCenterX + bodyW * 0.7;
    const frontArmY = bodyCenterY - bodyH * 0.15;
    const frontArmSwing = armSwing;
    
    ctx.save();
    ctx.translate(frontArmX, frontArmY);
    ctx.rotate(frontArmSwing);
    
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.35, 3.5, armH * 0.4, 0, 0, Math.PI * 2);
    ctx.fillStyle = jerseyAccent || jerseyColor;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, armH * 0.65, 3, 0, Math.PI * 2);
    ctx.fillStyle = skinColor;
    ctx.fill();
    
    ctx.restore();
    
    // === 头部 ===
    const headX = bodyCenterX;
    const headY = bodyCenterY - bodyH - headR + 2 + breathe;
    
    ctx.beginPath();
    ctx.arc(headX, headY - 1, headR + 4, Math.PI * 0.9, Math.PI * 0.1, false);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX - headR * 0.3, headY - headR - 2, 6, 5, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX + headR * 0.2, headY - headR - 1, 5, 4.5, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX + headR * 0.55, headY - headR * 0.6, 4.5, 4, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = hairColor;
    ctx.fill();
    
    ctx.beginPath();
    ctx.arc(headX, headY, headR, 0, Math.PI * 2);
    ctx.fillStyle = skinColor;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.arc(headX, headY - 1, headR + 3, Math.PI * 1.1, Math.PI * 1.9, false);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.65, headY - headR * 0.6);
    ctx.quadraticCurveTo(headX - headR * 0.5, headY - headR * 0.15, headX - headR * 0.35, headY - headR * 0.1);
    ctx.quadraticCurveTo(headX - headR * 0.45, headY - headR * 0.4, headX - headR * 0.55, headY - headR * 0.7);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.3, headY - headR * 0.7);
    ctx.quadraticCurveTo(headX - headR * 0.15, headY - headR * 0.2, headX - headR * 0.05, headY - headR * 0.15);
    ctx.quadraticCurveTo(headX - headR * 0.2, headY - headR * 0.5, headX - headR * 0.25, headY - headR * 0.75);
    ctx.fillStyle = hairColor;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(headX + headR * 0.1, headY - headR * 0.65);
    ctx.quadraticCurveTo(headX + headR * 0.2, headY - headR * 0.2, headX + headR * 0.15, headY - headR * 0.15);
    ctx.quadraticCurveTo(headX + headR * 0.05, headY - headR * 0.45, headX + headR * 0.05, headY - headR * 0.7);
    ctx.fillStyle = hairColor;
    ctx.fill();
    
    // 眼睛
    const eyeY = headY + headR * 0.1;
    const eyeSpacing = headR * 0.35;
    
    ctx.beginPath();
    ctx.ellipse(headX - eyeSpacing, eyeY, 3.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX - eyeSpacing + 0.5, eyeY + 0.5, 2.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headX - eyeSpacing + 1.2, eyeY - 0.5, 0.9, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    
    ctx.beginPath();
    ctx.ellipse(headX + eyeSpacing, eyeY, 3.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX + eyeSpacing + 0.5, eyeY + 0.5, 2.2, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headX + eyeSpacing + 1.2, eyeY - 0.5, 0.9, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    
    // 嘴巴
    ctx.beginPath();
    if (moving) {
        ctx.ellipse(headX, headY + headR * 0.45, 3.5, 2.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#c44';
        ctx.fill();
    } else {
        ctx.moveTo(headX - 3, headY + headR * 0.4);
        ctx.lineTo(headX + 3, headY + headR * 0.4);
        ctx.strokeStyle = '#a66';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }
    
    // 眉毛
    ctx.beginPath();
    ctx.moveTo(headX - eyeSpacing - 3, headY - headR * 0.2);
    ctx.lineTo(headX - eyeSpacing + 3, headY - headR * 0.35);
    ctx.strokeStyle = hairColor;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(headX + eyeSpacing - 3, headY - headR * 0.35);
    ctx.lineTo(headX + eyeSpacing + 3, headY - headR * 0.2);
    ctx.strokeStyle = hairColor;
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 守门员手套
    if (isKeeper) {
        ctx.beginPath();
        ctx.ellipse(frontArmX + 5, frontArmY + armH * 0.65 + 2, 5, 4, 0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.strokeStyle = '#cc9900';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        ctx.beginPath();
        ctx.ellipse(backArmX - 5, backArmY + armH * 0.65 + 2, 5, 4, -0.3, 0, Math.PI * 2);
        ctx.fillStyle = '#ffcc00';
        ctx.fill();
        ctx.stroke();
    }
    
    ctx.restore();
}

// ============================================================
// Q版机甲守卫机器人绘制系统（AI和守门员使用）
// ============================================================
/**
 * 绘制Q版机甲守卫机器人
 * @param {CanvasRenderingContext2D} ctx - 画布上下文
 * @param {number} x - 脚底中心X
 * @param {number} y - 脚底中心Y
 * @param {Object} config - 机甲配置 { radius, isKeeper, number }
 * @param {Object} animState - 动画状态 { animTime, moving }
 * @param {number} facingAngle - 面朝方向
 */
function drawMech(ctx, x, y, config, animState, facingAngle = 0) {
    const { animTime, moving } = animState;
    const r = config.radius || 16;
    
    // ========== 基础尺寸计算 ==========
    const headR = r * 0.95;        // 头部半径（大头）
    const bodyH = r * 1.0;         // 身体高度
    const bodyW = r * 0.85;        // 身体宽度
    const legH = r * 0.9;          // 腿高（机甲腿短一些）
    const armH = r * 0.7;          // 手臂长
    const footH = r * 0.3;         // 脚部高度
    
    // 基准位置（脚底中心）
    const baseX = x;
    const baseY = y;
    
    // ========== 动画参数 ==========
    const breathe = Math.sin(animTime * 2) * (moving ? 0.3 : 1.2); // 呼吸起伏
    const runCycle = animTime * 8;  // 跑步周期
    const legSwing = moving ? Math.sin(runCycle) * 0.4 : 0;       // 腿部摆动
    const armSwing = moving ? Math.sin(runCycle) * 0.35 : Math.sin(animTime * 1.5) * 0.05; // 手臂摆动
    const bodyLean = moving ? 2 : 0;  // 跑动时身体前倾
    
    // ========== 机甲颜色配置 ==========
    const isKeeper = config.isKeeper || false;
    const mechBody = '#d8d8e8';      // 银白色机甲主体
    const mechBodyDark = '#a8a8b8'; // 深银色阴影
    const mechBlue = '#00a8ff';     // 蓝色装饰
    const mechBlueDark = '#0066aa'; // 深蓝色
    const eyeGlow = '#00d4ff';      // 眼睛发光色
    const warningRed = '#ff3333';   // 红色警示灯
    const warningOrange = '#ff8800'; // 橙色警示灯
    
    // 身体中心位置（考虑呼吸偏移）
    const bodyCenterY = baseY - legH - bodyH / 2 - footH + breathe;
    const bodyCenterX = baseX + bodyLean;
    
    ctx.save();
    
    // ========== 地面阴影 ==========
    ctx.beginPath();
    ctx.ellipse(baseX, baseY + 2, r * 0.75, r * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fill();
    
    // ========== 守门员金色光晕 ==========
    if (isKeeper) {
        const haloPulse = Math.sin(animTime * 3) * 0.15 + 0.85;
        ctx.beginPath();
        ctx.ellipse(bodyCenterX, bodyCenterY, r + 12, r + 10, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 200, 50, ${0.12 * haloPulse})`;
        ctx.fill();
        ctx.strokeStyle = `rgba(255, 215, 0, ${0.4 * haloPulse})`;
        ctx.lineWidth = 2;
        ctx.stroke();
    }
    
    // ========== 背部推进器（后背小背包）==========
    const packX = bodyCenterX - 3;
    const packY = bodyCenterY - bodyH * 0.1;
    ctx.beginPath();
    ctx.roundRect(packX - 5, packY - 4, 10, 12, 2);
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 1;
    ctx.stroke();
    // 推进器喷口发光
    ctx.beginPath();
    ctx.arc(packX, packY + 8, 2, 0, Math.PI * 2);
    ctx.fillStyle = moving ? '#00ffff' : '#006688';
    ctx.shadowColor = '#00ffff';
    ctx.shadowBlur = moving ? 8 : 3;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // ========== 后腿（左侧/远处的腿）==========
    const backLegX = baseX - bodyW * 0.28;
    const backLegY = baseY - footH;
    const backLegOffset = legSwing * 3;
    
    // 后腿-大腿（机械结构）
    ctx.beginPath();
    ctx.moveTo(backLegX - 4, backLegY - legH * 0.55 + backLegOffset);
    ctx.lineTo(backLegX + 4, backLegY - legH * 0.55 + backLegOffset);
    ctx.lineTo(backLegX + 4, backLegY - legH * 0.25);
    ctx.lineTo(backLegX - 4, backLegY - legH * 0.25);
    ctx.closePath();
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    // 后腿关节（圆形铆钉）
    ctx.beginPath();
    ctx.arc(backLegX, backLegY - legH * 0.4 + backLegOffset * 0.5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 后腿-小腿
    ctx.beginPath();
    ctx.moveTo(backLegX - 3.5, backLegY - legH * 0.25);
    ctx.lineTo(backLegX + 3.5, backLegY - legH * 0.25);
    ctx.lineTo(backLegX + 3.5, backLegY);
    ctx.lineTo(backLegX - 3.5, backLegY);
    ctx.closePath();
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    
    // 后腿-脚部（机甲靴子）
    ctx.beginPath();
    ctx.ellipse(backLegX + 1, backLegY - footH * 0.4, 5, footH * 0.6, 0.1, 0, Math.PI * 2);
    ctx.fillStyle = mechBlueDark;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    
    // ========== 后臂（左侧/远处的臂）==========
    const backArmX = bodyCenterX - bodyW * 0.75;
    const backArmY = bodyCenterY - bodyH * 0.15;
    const backArmSwing = -armSwing + 0.15; // 向后摆动
    
    ctx.save();
    ctx.translate(backArmX, backArmY);
    ctx.rotate(backArmSwing);
    
    // 后手臂（大臂）
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.3, 3, armH * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    
    // 肩关节
    ctx.beginPath();
    ctx.arc(0, -armH * 0.05, 3, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 后手臂（小臂）
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.55, 2.5, armH * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    
    // 后手（机甲手掌）
    ctx.beginPath();
    ctx.arc(0, armH * 0.72, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = mechBlueDark;
    ctx.fill();
    
    ctx.restore();
    
    // ========== 身体（机甲躯干）==========
    ctx.beginPath();
    ctx.ellipse(bodyCenterX, bodyCenterY, bodyW, bodyH, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // 胸口蓝色装饰线
    ctx.beginPath();
    ctx.moveTo(bodyCenterX - bodyW * 0.5, bodyCenterY - bodyH * 0.3);
    ctx.lineTo(bodyCenterX, bodyCenterY + bodyH * 0.1);
    ctx.lineTo(bodyCenterX + bodyW * 0.5, bodyCenterY - bodyH * 0.3);
    ctx.strokeStyle = mechBlue;
    ctx.lineWidth = 2;
    ctx.shadowColor = mechBlue;
    ctx.shadowBlur = 4;
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // 胸口"LIDEAI"标识
    ctx.fillStyle = mechBlueDark;
    ctx.font = `bold ${r * 0.45}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('LIDEAI', bodyCenterX, bodyCenterY + bodyH * 0.35);
    
    // 胸甲细节（能量核心）
    ctx.beginPath();
    ctx.arc(bodyCenterX, bodyCenterY - bodyH * 0.5, 3, 0, Math.PI * 2);
    ctx.fillStyle = isKeeper ? '#ffcc00' : mechBlue;
    ctx.shadowColor = isKeeper ? '#ffcc00' : mechBlue;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 肩甲（左）
    ctx.beginPath();
    ctx.ellipse(bodyCenterX - bodyW * 0.75, bodyCenterY - bodyH * 0.5, 5, 4, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlue;
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // 肩甲（右）
    ctx.beginPath();
    ctx.ellipse(bodyCenterX + bodyW * 0.75, bodyCenterY - bodyH * 0.5, 5, 4, 0.2, 0, Math.PI * 2);
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlue;
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // 躯干侧面蓝色装饰条
    ctx.beginPath();
    ctx.moveTo(bodyCenterX - bodyW * 0.7, bodyCenterY + bodyH * 0.4);
    ctx.lineTo(bodyCenterX - bodyW * 0.7, bodyCenterY + bodyH * 0.7);
    ctx.strokeStyle = mechBlue;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(bodyCenterX + bodyW * 0.7, bodyCenterY + bodyH * 0.4);
    ctx.lineTo(bodyCenterX + bodyW * 0.7, bodyCenterY + bodyH * 0.7);
    ctx.stroke();
    
    // 腰部连接
    ctx.beginPath();
    ctx.ellipse(bodyCenterX, bodyCenterY + bodyH * 0.75, bodyW * 0.5, bodyH * 0.15, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    
    // ========== 前腿（右侧/近处的腿）==========
    const frontLegX = baseX + bodyW * 0.28;
    const frontLegY = baseY - footH;
    const frontLegOffset = -legSwing * 3;
    
    // 前腿-大腿
    ctx.beginPath();
    ctx.moveTo(frontLegX - 4, frontLegY - legH * 0.55 + frontLegOffset);
    ctx.lineTo(frontLegX + 4, frontLegY - legH * 0.55 + frontLegOffset);
    ctx.lineTo(frontLegX + 4, frontLegY - legH * 0.25);
    ctx.lineTo(frontLegX - 4, frontLegY - legH * 0.25);
    ctx.closePath();
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 0.8;
    ctx.stroke();
    
    // 前腿关节
    ctx.beginPath();
    ctx.arc(frontLegX, frontLegY - legH * 0.4 + frontLegOffset * 0.5, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 前腿-小腿
    ctx.beginPath();
    ctx.moveTo(frontLegX - 3.5, frontLegY - legH * 0.25);
    ctx.lineTo(frontLegX + 3.5, frontLegY - legH * 0.25);
    ctx.lineTo(frontLegX + 3.5, frontLegY);
    ctx.lineTo(frontLegX - 3.5, frontLegY);
    ctx.closePath();
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    
    // 前腿-脚部（机甲靴子）
    ctx.beginPath();
    ctx.ellipse(frontLegX - 1, frontLegY - footH * 0.4, 5, footH * 0.6, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = mechBlueDark;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    
    // ========== 前臂（右侧/近处的臂）==========
    const frontArmX = bodyCenterX + bodyW * 0.75;
    const frontArmY = bodyCenterY - bodyH * 0.15;
    const frontArmSwing = armSwing - 0.15; // 向前摆动
    
    ctx.save();
    ctx.translate(frontArmX, frontArmY);
    ctx.rotate(frontArmSwing);
    
    // 前手臂（大臂）
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.3, 3, armH * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBody;
    ctx.fill();
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    
    // 肩关节
    ctx.beginPath();
    ctx.arc(0, -armH * 0.05, 3, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 前手臂（小臂）
    ctx.beginPath();
    ctx.ellipse(0, armH * 0.55, 2.5, armH * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = mechBodyDark;
    ctx.fill();
    
    // 前手（守门员手掌更大更圆）
    const handSize = isKeeper ? 5 : 3.5;
    ctx.beginPath();
    ctx.arc(0, armH * 0.72, handSize, 0, Math.PI * 2);
    ctx.fillStyle = isKeeper ? '#00aaff' : mechBlueDark;
    ctx.fill();
    
    ctx.restore();
    
    // ========== 头部（机甲头盔）==========
    const headX = bodyCenterX + Math.cos(facingAngle) * 2; // 眼睛根据朝向偏移
    const headY = bodyCenterY - bodyH - headR + breathe;
    
    // 头盔主体（圆润白色外壳）
    ctx.beginPath();
    ctx.arc(headX, headY, headR, 0, Math.PI * 2);
    ctx.fillStyle = '#f0f0f8';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    
    // 头顶红色三角警示灯
    const warningY = headY - headR - 2;
    ctx.beginPath();
    ctx.moveTo(headX, warningY - 5);
    ctx.lineTo(headX - 4, warningY);
    ctx.lineTo(headX + 4, warningY);
    ctx.closePath();
    ctx.fillStyle = warningRed;
    ctx.shadowColor = warningRed;
    ctx.shadowBlur = 8;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 警示灯底座
    ctx.beginPath();
    ctx.ellipse(headX, warningY + 1, 5, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#333';
    ctx.fill();
    
    // 面罩区域（黑色方形显示屏）
    const maskW = headR * 1.3;
    const maskH = headR * 0.7;
    ctx.beginPath();
    ctx.roundRect(headX - maskW / 2, headY - maskH / 2, maskW, maskH, 3);
    ctx.fillStyle = '#1a1a2e';
    ctx.fill();
    
    // 眼睛发光效果（两个蓝色发光椭圆）
    const eyeY = headY;
    const eyeSpacing = headR * 0.35;
    const eyePulse = Math.sin(animTime * 4) * 0.2 + 0.8; // 眼睛脉动
    
    // 左眼
    ctx.beginPath();
    ctx.ellipse(headX - eyeSpacing + Math.cos(facingAngle) * 1, eyeY, 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = eyeGlow;
    ctx.shadowColor = eyeGlow;
    ctx.shadowBlur = 10 * eyePulse;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 左眼高光
    ctx.beginPath();
    ctx.ellipse(headX - eyeSpacing + Math.cos(facingAngle) * 1 + 1, eyeY - 1, 1.2, 0.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    
    // 右眼
    ctx.beginPath();
    ctx.ellipse(headX + eyeSpacing + Math.cos(facingAngle) * 1, eyeY, 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = eyeGlow;
    ctx.shadowColor = eyeGlow;
    ctx.shadowBlur = 10 * eyePulse;
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // 右眼高光
    ctx.beginPath();
    ctx.ellipse(headX + eyeSpacing + Math.cos(facingAngle) * 1 + 1, eyeY - 1, 1.2, 0.8, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    
    // 面罩边缘蓝色装饰线
    ctx.beginPath();
    ctx.roundRect(headX - maskW / 2 - 1, headY - maskH / 2 - 1, maskW + 2, maskH + 2, 4);
    ctx.strokeStyle = mechBlue;
    ctx.lineWidth = 1;
    ctx.shadowColor = mechBlue;
    ctx.shadowBlur = 3;
    ctx.stroke();
    ctx.shadowBlur = 0;
    
    // 头顶天线（两个小触角）
    ctx.beginPath();
    ctx.moveTo(headX - headR * 0.5, headY - headR * 0.9);
    ctx.lineTo(headX - headR * 0.6, headY - headR * 1.1);
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(headX - headR * 0.6, headY - headR * 1.15, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    ctx.beginPath();
    ctx.moveTo(headX + headR * 0.5, headY - headR * 0.9);
    ctx.lineTo(headX + headR * 0.6, headY - headR * 1.1);
    ctx.strokeStyle = mechBlueDark;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(headX + headR * 0.6, headY - headR * 1.15, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 头部两侧关节铆钉
    ctx.beginPath();
    ctx.arc(headX - headR * 0.8, headY + headR * 0.3, 2, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(headX + headR * 0.8, headY + headR * 0.3, 2, 0, Math.PI * 2);
    ctx.fillStyle = mechBlue;
    ctx.fill();
    
    // 机甲编号（头顶显示）
    if (config.number) {
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${r * 0.35}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(config.number, headX, headY + headR * 0.55);
    }
    
    ctx.restore();
}

}

    };
}

// 摄像机系统
// ============================================================
const camera = { y: 0, targetY: 0 };

function updateCamera() {
    // 主要跟随球的位置
    let targetY = ball.y - H / 2;
    
    // 确保玩家始终在视野内（如果玩家在视野下方，摄像机也要下移）
    const playerScreenY = player.y - camera.y;
    if (playerScreenY > H * 0.7) {
        targetY = player.y - H * 0.7;
    }
    
    // 限制摄像机范围（不超出场地边界）
    camera.targetY = Math.max(0, Math.min(VH - H, targetY));
    
    // 使用lerp平滑移动
    camera.y += (camera.targetY - camera.y) * 0.08;
}

function getRanking() {
    try { return JSON.parse(localStorage.getItem('arcShooterRank') || '[]'); } 
    catch(e) { return []; }
}
function saveRanking(timeMs) {
    const rank = getRanking();
    const now = new Date();
    const dateStr = (now.getMonth()+1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
    rank.push({ time: timeMs, date: dateStr, name: playerInfo.name || '匿名' });
    rank.sort((a, b) => a.time - b.time);
    if (rank.length > 8) rank.length = 8;
    localStorage.setItem('arcShooterRank', JSON.stringify(rank));
    return rank.findIndex(r => r.time === timeMs && r.date === dateStr);
}
function formatTime(ms) {
    const totalSec = ms / 1000;
    const min = Math.floor(totalSec / 60);
    const sec = Math.floor(totalSec % 60);
    const ms100 = Math.floor((ms % 1000) / 100);
    return (min > 0 ? min + ':' + String(sec).padStart(2,'0') : sec + '') + '.' + ms100 + 's';
}
function renderRanking(highlightIdx) {
    const rank = getRanking();
    const el = document.getElementById('rankList');
    if (!rank.length) { el.innerHTML = '<div style="color:#678;font-size:13px;">暂无记录</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    el.innerHTML = '<div style="color:#00b4ff;font-size:13px;margin-bottom:6px;">⏱ 最速排行</div>' +
        rank.map((r, i) => `<div class="rank-item${i === highlightIdx ? ' rank-new' : ''}">
            <span class="rank-pos">${i < 3 ? medals[i] : (i+1)+'.'}</span>
            <span class="rank-name">${r.name || ''}</span>
            <span class="rank-time">${formatTime(r.time)}</span>
        </div>`).join('');
}

const inp = { up:false, down:false, left:false, right:false, shoot:false, jx:0, jy:0 };
function initInput() {
    const kmap = { KeyW:'up', ArrowUp:'up', KeyS:'down', ArrowDown:'down', KeyA:'left', ArrowLeft:'left', KeyD:'right', ArrowRight:'right' };
    document.addEventListener('keydown', e => { if(kmap[e.code]) inp[kmap[e.code]]=true; if(e.code==='Space'){e.preventDefault();inp.shoot=true;} if(e.code==='ShiftLeft')isSprint=true; if(e.code==='KeyE')isCurve=true; });
    document.addEventListener('keyup', e => { if(kmap[e.code]) inp[kmap[e.code]]=false; if(e.code==='Space')inp.shoot=false; if(e.code==='ShiftLeft')isSprint=false; if(e.code==='KeyE')isCurve=false; });
    // 摇杆
    const ja = document.getElementById('joyArea'), jk = document.getElementById('joyKnob');
    let act = false; const mx = 38;
    ja.addEventListener('touchstart', e => { act=true; e.preventDefault(); });
    ja.addEventListener('touchmove', e => { if(!act)return; e.preventDefault(); const t=e.touches[0],r=ja.getBoundingClientRect(); let dx=t.clientX-(r.left+r.width/2),dy=t.clientY-(r.top+r.height/2),d=Math.sqrt(dx*dx+dy*dy); if(d>mx){dx=dx/d*mx;dy=dy/d*mx;} jk.style.transform=`translate(calc(-50%+${dx}px),calc(-50%+${dy}px))`; inp.jx=dx/mx; inp.jy=dy/mx; });
    const jEnd = () => { act=false; jk.style.transform='translate(-50%,-50%)'; inp.jx=0; inp.jy=0; };
    ja.addEventListener('touchend', jEnd); ja.addEventListener('touchcancel', jEnd);
    // 按钮
    document.getElementById('shootBtn').addEventListener('touchstart', e => { e.preventDefault(); inp.shoot=true; });
    document.getElementById('shootBtn').addEventListener('touchend', e => { e.preventDefault(); inp.shoot=false; });
    document.getElementById('sprintBtn').addEventListener('touchstart', e => { e.preventDefault(); isSprint=true; });
    document.getElementById('sprintBtn').addEventListener('touchend', e => { e.preventDefault(); isSprint=false; });
    document.getElementById('curveBtn').addEventListener('touchstart', e => { e.preventDefault(); isCurve=true; });
    document.getElementById('curveBtn').addEventListener('touchend', e => { e.preventDefault(); isCurve=false; });
    // 鼠标
    document.getElementById('shootBtn').addEventListener('mousedown', ()=>inp.shoot=true);
    document.getElementById('shootBtn').addEventListener('mouseup', ()=>inp.shoot=false);
    document.getElementById('sprintBtn').addEventListener('mousedown', ()=>isSprint=true);
    document.getElementById('sprintBtn').addEventListener('mouseup', ()=>isSprint=false);
    document.getElementById('curveBtn').addEventListener('mousedown', ()=>isCurve=true);
    document.getElementById('curveBtn').addEventListener('mouseup', ()=>isCurve=false);
}

// ============================================================
// 实体基类
// ============================================================
class Entity {
    constructor(x, y, r, c) { 
        this.x = x; 
        this.y = y; 
        this.r = r; 
        this.color = c; 
        this.angle = 0;
        this.image = null;
        this.animTime = 0;
        this.moving = false;
        this.prevX = x;
        this.prevY = y;
    }
    
    clamp() { 
        this.x = Math.max(FIELD.left + this.r, Math.min(FIELD.right - this.r, this.x)); 
        this.y = Math.max(FIELD.top + this.r, Math.min(FIELD.bottom - this.r, this.y)); 
    }
    
    updateAnimState() {
        const dx = this.x - this.prevX;
        const dy = this.y - this.prevY;
        const speed = Math.sqrt(dx * dx + dy * dy);
        this.moving = speed > 0.3;
        this.prevX = this.x;
        this.prevY = this.y;
        
        if (this.moving) {
            this.animTime += 0.15;
        } else {
            this.animTime += 0.03;
        }
    }
}

// ============================================================
// 玩家角色（保持Q版卡通人物）
// ============================================================
class Player extends Entity {
    constructor(x, y) { 
        super(x, y, CFG.PR, '#3498db'); 
        this.config = getPlayerConfig();
        // 惯性移动系统
        this.vx = 0;
        this.vy = 0;
    }
    
    update() {
        // 输入方向
        let dx = 0, dy = 0;
        if (inp.up) dy -= 1; 
        if (inp.down) dy += 1; 
        if (inp.left) dx -= 1; 
        if (inp.right) dx += 1;
        if (inp.jx || inp.jy) { dx = inp.jx; dy = inp.jy; }
        
        const len = Math.sqrt(dx * dx + dy * dy);
        const hasInput = len > 0.1;
        
        if (hasInput) { 
            dx /= len; dy /= len; 
            this.angle = Math.atan2(dy, dx); 
        }
        
        // 目标速度（考虑冲刺）
        const maxSpd = isSprint && energy > 0 ? CFG.P_SPD * 1.85 : CFG.P_SPD;
        const targetVx = hasInput ? dx * maxSpd : 0;
        const targetVy = hasInput ? dy * maxSpd : 0;
        
        // 加速/减速系数（非线性手感）
        const accel = hasInput ? 0.28 : 0.18; // 有输入加速快，无输入减速慢一点（惯性滑行）
        this.vx += (targetVx - this.vx) * accel;
        this.vy += (targetVy - this.vy) * accel;
        
        // 死区：速度很小时归零
        if (Math.abs(this.vx) < 0.05) this.vx = 0;
        if (Math.abs(this.vy) < 0.05) this.vy = 0;
        
        // 更新位置
        this.x += this.vx; 
        this.y += this.vy; 
        this.clamp();
        
        // 冲刺耗能/恢复
        if (isSprint && hasInput) energy = Math.max(0, energy - 0.25); 
        else if (!isSprint) energy = Math.min(100, energy + 0.3);
        
        this.updateAnimState();
    }
    
    draw() {
        // 光环效果（带球时更亮）
        if (hasBall) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r + 12, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 180, 255, 0.12)';
            ctx.fill();
            // 蓝色光环线已移除
        }
        
        // 绘制玩家角色：三视图spritesheet，根据方向选择视角
        if (PLAYER_SHEET.complete && PLAYER_SHEET.naturalWidth > 0) {
            // spritesheet: 108×662, 3帧竖排 (正面/背面/侧面各108×220)
            const frameW = 108, frameH = 221;
            const drawH = this.r * 6.0;
            const drawW = drawH * (frameW / frameH);
            
            // 根据朝向角度选择spritesheet帧
            let sx = 0, sy = 0;  // 源裁切起点
            let mirror = false;   // 是否水平镜像
            
            // angle: 向右=0, 向下=π/2, 向左=±π, 向上=-π/2
            const a = this.angle;
            const absCos = Math.abs(Math.cos(a));
            const absSin = Math.abs(Math.sin(a));
            
            if (this.moving && absCos > absSin * 0.7) {
                // 横向移动为主 → 侧面
                sy = frameH * 2;  // 第3帧（侧面）
                mirror = Math.cos(a) < 0;  // 朝左时镜像
            } else if (Math.sin(a) <= 0) {
                // 朝上（向球门方向） → 背面
                sy = frameH;  // 第2帧（背面）
            } else {
                // 朝下（回防方向） → 正面
                sy = 0;  // 第1帧（正面）
            }
            
            // 移动时上下弹跳动画
            let bobY = 0;
            if (this.moving) {
                bobY = Math.sin(this.animTime * 8) * 4;
            } else {
                bobY = Math.sin(this.animTime * 2) * 1.5;
            }
            
            // 移动时左右微晃
            let swayX = 0;
            if (this.moving) {
                swayX = Math.sin(this.animTime * 8) * 2;
            }
            
            // 绘制（含镜像处理）
            ctx.save();
            if (mirror) {
                ctx.translate(this.x + swayX, this.y + bobY);
                ctx.scale(-1, 1);
                ctx.drawImage(PLAYER_SHEET, sx, sy, frameW, frameH,
                    -drawW / 2, -drawH + this.r * 0.3, drawW, drawH);
            } else {
                ctx.drawImage(PLAYER_SHEET, sx, sy, frameW, frameH,
                    this.x - drawW / 2 + swayX, this.y - drawH + this.r * 0.3 + bobY, drawW, drawH);
            }
            ctx.restore();
            
            // 移动时脚下尘土效果
            if (this.moving && Math.random() > 0.7) {
                addTrail(this.x + (Math.random() - 0.5) * 10, this.y + this.r * 0.5, 0.8);
            }
        } else {
            // 降级：Canvas绘制卡通人物（也放大一倍）
            const bigConfig = { ...this.config, radius: this.config.radius * 2 };
            drawCartoonCharacter(ctx, this.x, this.y + this.r * 0.5, bigConfig, {
                animTime: this.animTime,
                moving: this.moving
            });
        }
        
        // 朝向指示器已移除
        ctx.stroke();
        ctx.shadowBlur = 0;
    }
}

// ============================================================
// AI防守队员（改为机甲守卫机器人）
// ============================================================
class AI extends Entity {
    constructor(x, y, role, slow) { 
        super(x, y, CFG.AR, '#e74c3c'); 
        this.role = role;
        this.slow = slow || false; // 慢速标记
        this.tx = x;
        this.ty = y;
        this.aiIndex = 0;
        this.config = null;
    }
    
    setAIIndex(idx) {
        this.aiIndex = idx;
        this.config = getAIConfig(idx);
    }
    
    update(p, ball) {
        switch (this.role) {
            case 'marker': this._marker(p); break;
            case 'interceptor': this._interceptor(p, ball); break;
            case 'free': this._free(ball, p); break;
        }
        this._avoidGA();
        this._separate(ais);
        this.clamp();
        this.angle = Math.atan2(this.ty - this.y, this.tx - this.x);
        this.updateAnimState();
    }
    
    _marker(p) { 
        const dx = p.x - this.x, dy = p.y - this.y, d = Math.sqrt(dx * dx + dy * dy) || 1; 
        this.tx = p.x - (dx / d) * 45; 
        this.ty = p.y - (dy / d) * 45; 
        this._mv(); 
    }
    
    _interceptor(p, ball) {
        // 在更大场地上，拦截者需要覆盖中场更大范围
        const gx = W / 2, gy = GOAL.bottom;
        const midDefenseZone = MID_Y - 100;
        if (!hasBall && !keeperHasBall) { this.tx = ball.x + (gx - ball.x) * 0.4; this.ty = ball.y + (gy - ball.y) * 0.3; }
        else { this.tx = p.x + (gx - p.x) * 0.4; this.ty = Math.max(midDefenseZone, p.y + (gy - p.y) * 0.4); }
        this._mv();
    }
    
    _free(ball, p) {
        // 在更大的场地上，free角色需要覆盖更大范围
        const cx = W / 2;
        const centerZone = MID_Y + 50;
        this.tx = ball.x < W / 2 ? cx - 70 : cx + 70;
        this.ty = p.y < PENALTY.bottom ? Math.min(centerZone, p.y + 100) : centerZone;
        this._mv();
    }
    
    _mv() { 
        const dx = this.tx - this.x, dy = this.ty - this.y, d = Math.sqrt(dx * dx + dy * dy); 
        const spd = this.slow ? CFG.A_SPD * 0.5 : CFG.A_SPD; // 慢速AI速度减半
        if (d > 4) { this.x += (dx / d) * spd; this.y += (dy / d) * spd; } 
    }
    
    _avoidGA() { 
        if (this.x > GA.left && this.x < GA.right && this.y > GA.top && this.y < GA.bottom) this.y = GA.bottom + this.r + 2; 
    }
    
    _separate(others) {
        const MIN_DIST = 130;
        for (const other of others) {
            if (other === this) continue;
            const dx = this.x - other.x, dy = this.y - other.y;
            const d = Math.sqrt(dx * dx + dy * dy) || 1;
            if (d < MIN_DIST) {
                const push = (MIN_DIST - d) * 0.3;
                this.x += (dx / d) * push;
                this.y += (dy / d) * push;
            }
        }
    }
    
    draw() {
        if (!this.config) this.config = getAIConfig(this.aiIndex);
        
        // 绘制机甲守卫：优先用贴图，降级用Canvas画
        if (MECH_IMG.complete && MECH_IMG.naturalWidth > 0) {
            const drawH = this.r * 5.5;  // 贴图绘制高度
            const drawW = drawH;  // 1:1宽高比（原图2048x2048）
            
            // 移动时上下弹跳动画
            let bobY = 0;
            if (this.moving) {
                bobY = Math.sin(this.animTime * 8) * 3.5;
            } else {
                bobY = Math.sin(this.animTime * 2) * 1.2;
            }
            
            // 移动时左右微晃
            let swayX = 0;
            if (this.moving) {
                swayX = Math.sin(this.animTime * 8) * 1.5;
            }
            
            // 朝向翻转
            ctx.save();
            const facingLeft = Math.cos(this.angle) < 0;
            if (facingLeft) {
                ctx.translate(this.x + swayX, this.y + bobY);
                ctx.scale(-1, 1);
                ctx.drawImage(MECH_IMG, -drawW / 2, -drawH + this.r * 0.3, drawW, drawH);
            } else {
                ctx.drawImage(MECH_IMG, this.x - drawW / 2 + swayX, this.y - drawH + this.r * 0.3 + bobY, drawW, drawH);
            }
            ctx.restore();
        } else {
            // 降级：Canvas绘制机甲
            drawMech(ctx, this.x, this.y + this.r * 0.5, this.config, {
                animTime: this.animTime,
                moving: this.moving
            }, this.angle);
        }
        
        // 朝向指示器已移除
    }
}

// ============================================================
// 守门员（改为机甲守门员）
// ============================================================
class Keeper extends Entity {
    constructor(x, y) { 
        super(x, y, CFG.KR, '#ffd700'); 
        this.homeX = x;
        this.config = getKeeperConfig();
    }
    
    update() {
        const mn = GOAL.left + this.r + 8, mx = GOAL.right - this.r - 8;
        let tx = this.homeX;
        if (ball.y < PENALTY.bottom) tx = Math.max(mn, Math.min(mx, ball.x));
        const dx = tx - this.x; 
        if (Math.abs(dx) > 1.5) this.x += Math.sign(dx) * CFG.K_SPD;
        this.x = Math.max(mn, Math.min(mx, this.x));
        this.y = GOAL.cy;
        this.updateAnimState();
    }
    
    canCatch() { return ball.y < GA.bottom + 12 && ball.x > GA.left - 12 && ball.x < GA.right + 12; }
    
    catchB() { return Math.abs(ball.x - this.x) < this.r + ball.r + 8 && Math.abs(ball.y - this.y) < this.r + ball.r + 14; }
    
    release() { 
        keeperHasBall = false; 
        ballKicked = false; // 守门员释放球后玩家可重新捡球
        ball.vx = 0; ball.vy = 0; 
        ball.x = player.x; ball.y = player.y + 20; 
        hasBall = true; 
    }
    
    draw() {
        // 绘制机甲守门员：优先用贴图，降级用Canvas画
        if (MECH_IMG.complete && MECH_IMG.naturalWidth > 0) {
            const drawH = this.r * 6.0;  // 守门员稍大
            const drawW = drawH;  // 1:1宽高比
            
            // 守门员特有动画
            let bobY = Math.sin(this.animTime * 2) * 1.5; // 待机呼吸
            
            // 金色光晕（守门员专属）
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r + 14, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 200, 50, 0.08)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.35)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.drawImage(MECH_IMG, this.x - drawW / 2, this.y - drawH + this.r * 0.3 + bobY, drawW, drawH);
        } else {
            // 降级：Canvas绘制机甲守门员
            drawMech(ctx, this.x, this.y + this.r * 0.5, this.config, {
                animTime: this.animTime,
                moving: this.moving
            }, 0);
        }
    }
}

// ============================================================
// 足球（升级为科技风格）
// ============================================================
class Ball extends Entity {
    constructor(x, y) { 
        super(x, y, CFG.BR, '#f39c12'); 
        this.vx = 0; this.vy = 0; 
        this.glowing = false;
        this.rotation = 0;   // 旋转角度
        this.spinSpeed = 0;  // 旋转速度
    }
    
    update() {
        if (hasBall) {
            this.x = player.x + Math.cos(player.angle) * (player.r + this.r + 3);
            this.y = player.y + Math.sin(player.angle) * (player.r + this.r + 3) + player.r * 0.3;
            addTrail(this.x, this.y, 0.3);
            this.glowing = true;
            this.spinSpeed *= 0.95; // 持球时旋转减速
            this.rotation += this.spinSpeed;
        } else if (!keeperHasBall) {
            this.x += this.vx; this.y += this.vy;
            if (isCurve && (Math.abs(this.vx) > 2 || Math.abs(this.vy) > 2)) this.vx += 0.12;
            this.vx *= 0.98; this.vy *= 0.98;
            if (Math.abs(this.vx) < 0.08) this.vx = 0; 
            if (Math.abs(this.vy) < 0.08) this.vy = 0;
            const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
            
            // 根据球速计算旋转
            if (speed > 0.5) {
                this.spinSpeed = speed * 0.15; // 运动中持续旋转
                this.rotation += this.spinSpeed;
            } else {
                this.spinSpeed *= 0.95;
                this.rotation += this.spinSpeed;
            }
            
            if (speed > 3) {
                addTrail(this.x, this.y, 0.5);
                this.glowing = true;
            } else {
                this.glowing = false;
            }
        }
        return this._bounds();
    }
    
    shoot(a, p) { this.vx = Math.cos(a) * p; this.vy = Math.sin(a) * p; hasBall = false; this.spinSpeed = p * 0.2; }
    
    bounce() { this.vx = -Math.cos(this.angle) * 4; this.vy = -Math.sin(this.angle) * 4; }
    
    _bounds() {
        if (this.x < FIELD.left + this.r) { this.x = FIELD.left + this.r; this.vx = Math.abs(this.vx) * .5; }
        if (this.x > FIELD.right - this.r) { this.x = FIELD.right - this.r; this.vx = -Math.abs(this.vx) * .5; }
        if (this.y < FIELD.top + this.r) { if (this.x < GOAL.left || this.x > GOAL.right) { this.y = FIELD.top + this.r; this.vy = Math.abs(this.vy) * .5; } }
        if (this.y > FIELD.bottom - this.r) { this.y = FIELD.bottom - this.r; this.vy = -Math.abs(this.vy) * .5; }
        
        if (!hasBall && !keeperHasBall && keeper.canCatch() && keeper.catchB()) {
            keeperHasBall = true; 
            keeperHoldStart = Date.now(); 
            this.vx = 0; this.vy = 0; 
            this.x = keeper.x; this.y = keeper.y; 
            return 'none';
        }
        
        if (this.y < GOAL.bottom && this.x > GOAL.left && this.x < GOAL.right) return 'goal';
        return 'none';
    }
    
    draw() {
        const r = this.r;
        const glowIntensity = this.glowing ? 1 : 0;
        
        // 外层光晕（高速或带球时）
        if (glowIntensity > 0) {
            ctx.beginPath(); 
            ctx.arc(this.x, this.y, r + 12, 0, Math.PI * 2);
            const glowGrad = ctx.createRadialGradient(this.x, this.y, r, this.x, this.y, r + 12);
            glowGrad.addColorStop(0, 'rgba(0, 212, 255, 0.4)');
            glowGrad.addColorStop(0.5, 'rgba(0, 150, 255, 0.2)');
            glowGrad.addColorStop(1, 'rgba(0, 100, 255, 0)');
            ctx.fillStyle = glowGrad;
            ctx.fill();
            
            // 金色光晕叠加
            ctx.beginPath(); 
            ctx.arc(this.x, this.y, r + 8, 0, Math.PI * 2);
            const goldGrad = ctx.createRadialGradient(this.x, this.y, r - 2, this.x, this.y, r + 8);
            goldGrad.addColorStop(0, 'rgba(255, 215, 0, 0.3)');
            goldGrad.addColorStop(1, 'rgba(255, 180, 0, 0)');
            ctx.fillStyle = goldGrad;
            ctx.fill();
        }
        
        // 绘制足球（使用贴图）
        if (BALL_IMG.complete && BALL_IMG.naturalWidth > 0) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            // 贴图绘制，尺寸为半径的3倍（圆形贴图含透明区域）
            const bSize = r * 3;
            ctx.drawImage(BALL_IMG, -bSize / 2, -bSize / 2, bSize, bSize);
            ctx.restore();
        } else {
            // 降级：简单圆形足球
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }}
}

// ============================================================
// 拖尾（科技光效）
// ============================================================
function addTrail(x, y, prob) { 
    if (Math.random() > prob) return; 
    trails.push({ x, y, a: 0.6, r: 4, type: Math.random() > 0.5 ? 'blue' : 'gold' }); 
    if (trails.length > 30) trails.shift(); 
}
function updateTrails() { 
    for (let i = trails.length - 1; i >= 0; i--) { 
        trails[i].a -= 0.02; 
        trails[i].r -= 0.1; 
        if (trails[i].a <= 0) trails.splice(i, 1); 
    } 
}
function drawTrails() { 
    for (const t of trails) { 
        ctx.beginPath(); 
        ctx.arc(t.x, t.y, Math.max(0.5, t.r), 0, Math.PI * 2);
        if (t.type === 'blue') {
            ctx.fillStyle = `rgba(0, 212, 255, ${t.a})`; 
            ctx.shadowColor = '#00d4ff';
        } else {
            ctx.fillStyle = `rgba(255, 200, 50, ${t.a})`;
            ctx.shadowColor = '#ffcc00';
        }
        ctx.shadowBlur = 5;
        ctx.fill();
        ctx.shadowBlur = 0;
    } 
}
