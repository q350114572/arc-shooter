<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>弧线射手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}
html,body{width:100%;min-height:100%;background:#1a1a2e;display:flex;justify-content:center;align-items:flex-start;overflow-y:auto}

/* 调试面板 */
#dbg{position:absolute;top:0;left:0;z-index:9999;color:#0f0;font-size:12px;background:rgba(0,0,0,0.85);padding:4px 8px;pointer-events:none;width:100%}

/* 游戏容器 */
#game-container{width:360px;height:640px;position:relative;overflow:hidden;background:#0a1628;border:2px solid #2a4a6a;border-radius:8px;margin:50px auto;}

/* 草地 */
#field{position:absolute;width:100%;height:100%;overflow:hidden}
/* 移动端顶部安全区提示 */
#field::before{content:'';position:absolute;top:0;left:0;width:100%;height:30px;background:linear-gradient(180deg,rgba(255,215,0,0.15),transparent);z-index:50;pointer-events:none}

/* 草地背景 */
.field-bg{position:absolute;width:360px;height:1067px;background:linear-gradient(180deg,#1e4620 0%,#2d5a2f 50%,#1e4620 100%)}

/* 草地纹理 */
.field-bg::before{content:'';position:absolute;width:100%;height:100%;background:repeating-linear-gradient(90deg,transparent,transparent 76px,rgba(255,255,255,0.03) 76px,rgba(255,255,255,0.03) 80px)}

/* 中场线 */
#midline{position:absolute;width:360px;height:2px;background:rgba(255,255,255,0.4)}

/* 中圈 */
#midcircle{position:absolute;width:160px;height:160px;border:2px solid rgba(255,255,255,0.4);border-radius:50%}

/* 球门区域 */
#goal-area{position:absolute;width:200px;height:53px;border:3px solid #fff;border-top:none;border-radius:0 0 10px 10px;background:rgba(0,0,0,0.3)}
#goal-net{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.1) 8px,rgba(255,255,255,0.1) 10px)}

/* 禁区 */
#penalty{position:absolute;width:373px;height:187px;border:2px solid rgba(255,255,255,0.3);border-top:none;background:rgba(0,0,0,0.1)}

/* ===== 角色基础样式 ===== */
.entity{position:absolute;transition:none}

/* 玩家 - 贴图模式 */
#player{width:60px;height:133px;z-index:10}
#player img{width:100%;height:100%;object-fit:contain;image-rendering:auto}

/* 防守球员 */
.defender{width:60px;height:73px;z-index:8}
.defender img{width:100%;height:100%;object-fit:contain}

/* 守门员 */
#goalkeeper{width:60px;height:73px;z-index:9}
#goalkeeper img{width:100%;height:100%;object-fit:contain}

/* 足球 */
#ball{width:20px;height:20px;background:radial-gradient(circle at 30% 30%,#fff,#ccc);border-radius:50%;border:1px solid #999;box-shadow:0 2px 8px rgba(0,0,0,0.4);z-index:11}
.ball-shadow{position:absolute;width:16px;height:6px;background:rgba(0,0,0,0.3);border-radius:50%;top:18px;left:2px;filter:blur(2px)}

/* 足球拖尾 */
.trail{position:absolute;width:14px;height:14px;background:rgba(255,255,255,0.4);border-radius:50%;pointer-events:none;z-index:5}

/* ===== UI层 ===== */
#hud{position:absolute;top:10px;left:0;width:100%;padding:0 15px;display:flex;justify-content:space-between;align-items:center;z-index:100;pointer-events:none}
.hud-box{background:rgba(0,0,0,0.6);padding:6px 12px;border-radius:20px;color:#fff;font-size:14px;border:1px solid rgba(255,255,255,0.2)}
#timer{font-family:monospace;font-size:18px;color:#0f0}

/* 射门按钮 */
#shoot-btn{position:absolute;bottom:100px;right:15px;width:70px;height:70px;background:radial-gradient(circle,#ff4444,#cc0000);border-radius:50%;border:3px solid #ff6666;z-index:100;display:flex;justify-content:center;align-items:center;color:#fff;font-weight:bold;font-size:14px;box-shadow:0 4px 15px rgba(255,0,0,0.5);cursor:pointer}
#shoot-btn:active{transform:scale(0.95);box-shadow:0 2px 8px rgba(255,0,0,0.5)}



/* 虚拟摇杆 */
#joystick-zone{position:absolute;bottom:20px;left:15px;width:100px;height:120px;background:rgba(255,255,255,0.1);border-radius:50%;border:2px solid rgba(255,255,255,0.3);z-index:100}
#joystick-knob{position:absolute;width:50px;height:50px;background:rgba(255,255,255,0.6);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);border:2px solid rgba(255,255,255,0.8)}

/* ===== 开始界面 ===== */
#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#1a1a2e,#16213e);z-index:1000;display:none;flex-direction:column;justify-content:center;align-items:center;padding:20px}
#start-screen h1{color:#fff;font-size:32px;margin-bottom:10px;text-shadow:0 0 20px #1e90ff}
#start-screen h2{color:#aaa;font-size:16px;margin-bottom:40px}
.form-group{margin-bottom:15px;width:280px}
.form-group label{color:#aaa;font-size:14px;display:block;margin-bottom:5px}
.form-group input{width:100%;padding:12px;border-radius:8px;border:2px solid #2a4a6a;background:#0a1628;color:#fff;font-size:16px;outline:none}
.form-group input:focus{border-color:#1e90ff}
.form-group input::placeholder{color:#555}
.form-group small{color:#666;font-size:11px;display:block;margin-top:3px}
#start-btn{width:280px;padding:15px;border-radius:30px;background:linear-gradient(180deg,#1e90ff,#0066cc);color:#fff;font-size:18px;font-weight:bold;border:none;cursor:pointer;margin-top:20px;box-shadow:0 4px 20px rgba(30,144,255,0.5)}
#start-btn:hover{background:linear-gradient(180deg,#3da0ff,#1e90ff)}
.controls-info{color:#666;font-size:12px;margin-top:30px;text-align:center;line-height:1.8}

/* 胜利/失败界面 */
#end-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:1000;display:none;flex-direction:column;justify-content:center;align-items:center;padding:20px}
#end-screen h1{font-size:48px;margin-bottom:20px}
#end-screen.win h1{color:#ffd700;text-shadow:0 0 30px #ffd700}
#end-screen.lose h1{color:#ff4444;text-shadow:0 0 30px #ff4444}
#end-msg{color:#aaa;margin-bottom:20px;font-size:16px}
#leaderboard{margin-bottom:30px;width:300px;max-height:350px;overflow-y:auto}
#leaderboard table{width:100%;border-collapse:collapse;color:#fff;font-size:14px}
#leaderboard th{background:#2a4a6a;padding:8px;text-align:left}
#leaderboard td{padding:8px;border-bottom:1px solid #333}
#leaderboard tr:nth-child(1) td{color:#ffd700;font-weight:bold}
#leaderboard tr:nth-child(2) td{color:#c0c0c0}
#leaderboard tr:nth-child(3) td{color:#cd7f32}
#restart-btn{padding:15px 40px;border-radius:30px;background:#1e90ff;color:#fff;font-size:16px;border:none;cursor:pointer}
#lottery-btn{margin-top:15px;padding:12px 36px;border-radius:30px;background:linear-gradient(135deg,#ff6600,#ffcc00);color:#fff;font-size:16px;border:2px solid #ffd700;cursor:pointer;font-weight:bold;box-shadow:0 4px 15px rgba(255,102,0,0.5)}
#lottery-btn:active{transform:scale(0.95)}
#lottery-btn:disabled{opacity:0.5;cursor:not-allowed}
#lottery-result{margin-top:15px;padding:15px 30px;border-radius:15px;display:none;text-align:center}
#lottery-result.special{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#1a1a2e;font-size:24px;font-weight:bold;box-shadow:0 0 30px #ffd700}
#lottery-result.first{background:linear-gradient(135deg,#ff4444,#ff8800);color:#fff;font-size:20px;font-weight:bold;box-shadow:0 0 20px #ff4444}
#lottery-result.second{background:linear-gradient(135deg,#4488ff,#44ccff);color:#fff;font-size:18px;font-weight:bold;box-shadow:0 0 15px #4488ff}
#lottery-result.third{background:rgba(255,255,255,0.1);color:#aaa;font-size:16px;border:1px solid #555}

/* 方向指示器 */
#direction-hint{position:absolute;bottom:250px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;opacity:0.7}

/* 动画覆盖层 */
#anim-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1100;background:#000;display:flex;justify-content:center;align-items:center;cursor:pointer;transition:opacity 0.5s}
#anim-overlay.fade-out{opacity:0;pointer-events:none}
#anim-overlay video{max-width:100%;max-height:100%;object-fit:contain}
#celeb-overlay{position:absolute;top:0;left:0;width:100%;height:100%;z-index:90;background:rgba(0,0,0,0.6);display:none;justify-content:center;align-items:center;cursor:pointer}
#celeb-overlay video{max-width:100%;max-height:100%;object-fit:contain}

</style>
</head>

// ===== 动画控制 =====
const startAnimOverlay = document.getElementById('anim-overlay');
const startAnimVideo = document.getElementById('start-anim');
const celebOverlay = document.getElementById('celeb-overlay');
const celebAnimVideo = document.getElementById('celeb-anim');
let celebCallback = null;

// 开始动画：播完或点击后淡出进入游戏
if(startAnimVideo){
  function dismissStartAnim(){
    startAnimVideo.pause();
    startAnimOverlay.classList.add('fade-out');
    setTimeout(()=>{
      startAnimOverlay.style.display='none';
      // 动画结束后显示开始界面
      document.getElementById('start-screen').style.display = 'flex';
    },500);
  }
  // 只有点击才关闭，视频循环播放
  startAnimOverlay.onclick = ()=>{
    dismissStartAnim();
  };
  // 确保自动播放（部分浏览器需要显式play）
  fetchSharedLeaderboard();  // 开场就预取排行榜
  startAnimVideo.play().catch(()=>{
    // 播放失败直接显示表单
    dismissStartAnim();
  });
  // 如果5秒后还在显示（视频没播/播不了），自动关闭
  setTimeout(()=>{
    if(startAnimOverlay && startAnimOverlay.style.display !== 'none' && !startAnimOverlay.classList.contains('fade-out')){
      dismissStartAnim();
    }
  }, 5000);
}

// 如果没有开场动画，直接显示表单
if(!startAnimVideo){
  document.getElementById('start-screen').style.display = 'flex';
}

// 播放庆祝动画，结束后回调
function playCelebration(cb){
  if(!celebAnimVideo){ cb(); return; }
  celebCallback = cb;
  celebOverlay.style.display = 'flex';
  celebAnimVideo.currentTime = 0;
  celebAnimVideo.play().catch(()=>{ celebOverlay.style.display='none'; cb(); });
  celebAnimVideo.onended = ()=>{
    celebOverlay.style.display = 'none';
    if(celebCallback) celebCallback();
  };
  celebOverlay.onclick = ()=>{
    celebAnimVideo.pause();
    celebOverlay.style.display = 'none';
    if(celebCallback) celebCallback();
  };
}

const camera = { x: 0, y: 0 };

// 玩家位置（逻辑坐标）
let px = 180, py = 800;
let bx = 180, by = 867;

// 足球速度
let bvx = 0, bvy = 0;

// 角色状态
let hasBall = true;
let ballMoving = false;
let shootCooldown = 0;
let defenderKickCooldown = 0;  // 防守球员解围冷却，防止球反复被截

// 计时
let startTime = 0;
let elapsed = 0;
let gameOver = false;

// AI状态
let keeperX = 180, keeperDir = 1;
let keeperY = 40;

// 10名防守球员
const DEFENDER_COUNT = 10;
let defenders = [];
let defenderEls = [];

// ===== 输入状态 =====
const input = { dx: 0, dy: 0, shoot: false };
const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const keys = {};
let mouseTarget = null;
  let wasTouching = false;
  let wasTouchingTimer = null;
let joystickActive = false;
let joystickStartX = 0, joystickStartY = 0;

// ===== DOM引用 =====
let playerEl, ballEl, keeperEl;
let joystickZone, joystickKnob;
let timerEl, scoreEl, playerNameEl;
let startScreen, endScreen;
let dbgEl;
let fieldBg, midline, midcircle, penaltyEl, goalArea;

// ===== 初始化 =====
function init() {
  // 获取DOM引用
  playerEl = document.getElementById('player');
  playerSpriteEl = document.getElementById('player-sprite');
  playerSpriteEl.src = SPRITE_IDLE;
  ballEl = document.getElementById('ball');
  keeperEl = document.getElementById('goalkeeper');
  keeperEl.querySelector('img').src = SPRITE_DEFENDER;
  joystickZone = document.getElementById('joystick-zone');
  joystickKnob = document.getElementById('joystick-knob');
  timerEl = document.getElementById('timer');
  scoreEl = document.getElementById('score');
  playerNameEl = document.getElementById('player-name');
  startScreen = document.getElementById('start-screen');
  endScreen = document.getElementById('end-screen');
  dbgEl = document.getElementById('dbg');
  fieldBg = document.getElementById('field-bg');
  midline = document.getElementById('midline');
  midcircle = document.getElementById('midcircle');
  penaltyEl = document.getElementById('penalty');
  goalArea = document.getElementById('goal-area');
  
  // 创建10名防守球员
  createDefenders();
  
  // 事件绑定
  bindEvents();
  
  // 初始化摄像机
  updateCamera(true);
  renderField();
  
  dbgEl.textContent = '已初始化，点击开始游戏';
}

function createDefenders() {
  const field = document.getElementById('field');
  
  // 生成均匀分布的初始位置
  // 上半区: y: 200-1100，划分为5行2列
  defenders = [];
  
  for (let i = 0; i < DEFENDER_COUNT; i++) {
    const col = i % 2;
    const row = Math.floor(i / 2);
    
    // 每个格子的大小
    const cellW = (FIELD_W - 100) / 2;
    const cellH = (733 - 133) / 5;
    
    // 格子中心 + 随机偏移
    const baseX = 50 + col * cellW + cellW / 2;
    const baseY = 200 + row * cellH + cellH / 2;
    
    const offsetX = (Math.random() - 0.5) * cellW * 0.6;
    const offsetY = (Math.random() - 0.5) * cellH * 0.6;
    
    const def = {
      x: Math.max(30, Math.min(FIELD_W - 70, baseX + offsetX)),
      y: Math.max(133, Math.min(733, baseY + offsetY)),
      homeX: baseX + offsetX,
      homeY: baseY + offsetY,
      hasBall: false
    };
    defenders.push(def);
    
    // 创建DOM元素
    const el = document.createElement('div');
    el.className = 'entity defender';
    el.innerHTML = '<img src="' + SPRITE_DEFENDER + '" alt="">';
    field.appendChild(el);
    defenderEls.push(el);
  }
}

function bindEvents() {
  const container = document.getElementById('game-container');
  
  // ===== 键盘事件（绑定在document） =====
  document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;
    
    if (e.code === 'Space') {
      input.shoot = true;
      e.preventDefault();
    }
    
    updateKeyInput();
  });
  
  document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
    updateKeyInput();
  });
  
  // ===== 鼠标点击场地移动 =====
  // 仅桌面端点击生效，触摸设备靠摇杆操控
  container.addEventListener('click', (e) => {
    if (!running || endScreen.style.display === 'flex' || gameOver) return;
    if (isTouchDevice) return;  // 触摸设备完全禁止click移动
    if (wasTouching) { wasTouching = false; return; }
    const rect = container.getBoundingClientRect();
    const tx = e.clientX - rect.left + camera.x;
    const ty = e.clientY - rect.top + camera.y;
    mouseTarget = { x: tx, y: ty };
    dbgEl.textContent = `鼠标目标: ${Math.round(tx)},${Math.round(ty)}`;
  });
  // 触摸直接设目标会导致失控，改为清除目标
  container.addEventListener('touchstart', (e) => {
    mouseTarget = null;
    wasTouching = true;
    clearTimeout(wasTouchingTimer);
    wasTouchingTimer = setTimeout(() => { wasTouching = false; }, 1500);
  }, { passive: true });
  container.addEventListener('touchmove', (e) => { mouseTarget = null; }, { passive: true });
  container.addEventListener('touchend', () => { mouseTarget = null; }, { passive: true });
  
  // ===== 射门/弧线按钮 =====
  const shootBtn = document.getElementById('shoot-btn');
  
  shootBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    input.shoot = true;
  });
  shootBtn.addEventListener('touchend', () => { input.shoot = false; });
  shootBtn.addEventListener('mousedown', () => { input.shoot = true; });
  shootBtn.addEventListener('mouseup', () => { input.shoot = false; });
  shootBtn.addEventListener('mouseleave', () => { input.shoot = false; });
  
  // ===== 虚拟摇杆（触摸） =====
  joystickZone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    joystickActive = true;
    const touch = e.touches[0];
    const rect = joystickZone.getBoundingClientRect();
    joystickStartX = rect.left + rect.width / 2;
    joystickStartY = rect.top + rect.height / 2;
  });
  
  joystickZone.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!joystickActive) return;
    const touch = e.touches[0];
    updateJoystick(touch.clientX, touch.clientY);
  });
  
  function resetJoystick() {
    joystickActive = false;
    input.dx = 0;
    input.dy = 0;
    joystickKnob.style.transform = 'translate(-50%, -50%)';
  }
  joystickZone.addEventListener('touchend', resetJoystick);
  joystickZone.addEventListener('touchcancel', resetJoystick);
  document.addEventListener('touchend', (e) => {
    if (joystickActive && e.touches.length === 0) resetJoystick();
  });
  document.addEventListener('touchcancel', () => { if (joystickActive) resetJoystick(); });
  
  // ===== 虚拟摇杆（鼠标） =====
  joystickZone.addEventListener('mousedown', (e) => {
    e.preventDefault();
    joystickActive = true;
    const rect = joystickZone.getBoundingClientRect();
    joystickStartX = rect.left + rect.width / 2;
    joystickStartY = rect.top + rect.height / 2;
    document.addEventListener('mousemove', onJoystickMouseMove);
    document.addEventListener('mouseup', onJoystickMouseUp);
  });
  
  function onJoystickMouseMove(e) {
    if (!joystickActive) return;
    updateJoystick(e.clientX, e.clientY);
  }
  
  function onJoystickMouseUp() {
    joystickActive = false;
    input.dx = 0;
    input.dy = 0;
    joystickKnob.style.transform = 'translate(-50%, -50%)';
    document.removeEventListener('mousemove', onJoystickMouseMove);
    document.removeEventListener('mouseup', onJoystickMouseUp);
  }
  window.addEventListener('blur', () => { if (joystickActive) onJoystickMouseUp(); });
  
  // ===== 开始按钮 =====
  document.getElementById('start-btn').addEventListener('click', () => {
    const name = document.getElementById('name-input').value.trim();
    const phone = document.getElementById('phone-input').value.trim();
    const company = document.getElementById('company-input').value.trim();
    if (!name) { document.getElementById('name-input').focus(); return; }
    if (!phone || phone.length < 11) { document.getElementById('phone-input').focus(); return; }
    if (!company) { document.getElementById('company-input').focus(); return; }
    playerNameEl.textContent = name;
    startScreen.style.display = 'none';
    startGame();
  });
  
  // ===== 重新开始按钮 =====
  document.getElementById('restart-btn').addEventListener('click', () => {
    resetGame();
    endScreen.style.display = 'none';
    document.getElementById('lottery-result').style.display = 'none';
    document.getElementById('lottery-btn').disabled = false;
    startGame();
  });
  
  // ===== 抽奖按钮 =====
  document.getElementById('lottery-btn').addEventListener('click', doLottery);
}

function updateJoystick(clientX, clientY) {
  const dx = clientX - joystickStartX;
  const dy = clientY - joystickStartY;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const maxDist = 45;
  
  let nx = dx, ny = dy;
  if (dist > maxDist) {
    nx = (dx / dist) * maxDist;
    ny = (dy / dist) * maxDist;
  }
  
  joystickKnob.style.transform = `translate(calc(-50% + ${nx}px), calc(-50% + ${ny}px))`;
  
  input.dx = dx / maxDist;
  input.dy = dy / maxDist;
  input.dx = Math.max(-1, Math.min(1, input.dx));
  input.dy = Math.max(-1, Math.min(1, input.dy));
}

function updateKeyInput() {

}

// ===== 游戏状态 =====
let running = false;

function startGame() {
  fetchSharedLeaderboard();  // 预加载共享排行榜
  resetGame();
  running = true;
  gameOver = false;
  startTime = performance.now();
  input.dx = 0;
  input.dy = 0;
  input.shoot = false;
  mouseTarget = null;
  dbgEl.textContent = '游戏开始!';
  requestAnimationFrame(gameLoop);
}

function resetGame() {
  px = 180; py = 800;
  bx = 180; by = 867;
  bvx = 0; bvy = 0;
  hasBall = true;
  ballMoving = false;
  shootCooldown = 0;
  mouseTarget = null;
  gameOver = false;
  
  // 重置守门员位置
  keeperX = 180;
  keeperDir = 1;
  
  // 重置防守球员位置
  defenders.forEach((def, i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);
    const cellW = (FIELD_W - 100) / 2;
    const cellH = (733 - 133) / 5;
    const baseX = 50 + col * cellW + cellW / 2;
    const baseY = 200 + row * cellH + cellH / 2;
    const offsetX = (Math.random() - 0.5) * cellW * 0.6;
    const offsetY = (Math.random() - 0.5) * cellH * 0.6;
    
    def.x = Math.max(20, Math.min(FIELD_W - 50, baseX + offsetX));
    def.y = Math.max(133, Math.min(733, baseY + offsetY));
    def.homeX = baseX + offsetX;
    def.homeY = baseY + offsetY;
    def.hasBall = false;
  });
  
  // 重置摄像机
  updateCamera(true);
  
  // 清空拖尾
  document.querySelectorAll('.trail').forEach(t => t.remove());
}

// ===== 游戏循环 =====
function gameLoop(t) {
  if (!running) return;
  
  try {
    updateInput();
    updatePlayer();
    updateBall();
    updateAI();
    updateDefenders();
    checkCollisions();
    checkGoal();
    updateTimer();
    updateCamera(false);
    render();
    renderField();
    updateDebug();
  } catch (e) {
    dbgEl.textContent = 'ERR: ' + e.message;
  }
  
  requestAnimationFrame(gameLoop);
}

// ===== 摄像机更新 =====
function updateCamera(instant) {
  const targetCamX = px + 30 - VIEW_W / 2;
  const targetCamY = py - 580;  // 玩家在屏幕偏下方，确保球门可见
  
  if (instant) {
    camera.x = targetCamX;
    camera.y = targetCamY;
  } else {
    // lerp平滑插值
    camera.x += (targetCamX - camera.x) * 0.1;
    camera.y += (targetCamY - camera.y) * 0.1;
  }
  
  // 限制在场地范围内
  camera.x = Math.max(0, Math.min(FIELD_W - VIEW_W, camera.x));
  camera.y = Math.max(0, Math.min(FIELD_H - VIEW_H, camera.y));
}

// ===== 输入处理 =====
function updateInput() {
  // 键盘输入
  if (keys['w'] || keys['arrowup']) input.dy = -1;
  else if (keys['s'] || keys['arrowdown']) input.dy = 1;
  else if (!joystickActive && !mouseTarget) input.dy = 0;
  
  if (keys['a'] || keys['arrowleft']) input.dx = -1;
  else if (keys['d'] || keys['arrowright']) input.dx = 1;
  else if (!joystickActive && !mouseTarget) input.dx = 0;
  
  // 鼠标目标（带超时保护，2秒后自动清除）
  if (mouseTarget && !joystickActive) {
    if (!mouseTarget.time) mouseTarget.time = Date.now();
    if (Date.now() - mouseTarget.time > 1000) {
      // 超时清除，防止持续失控
      input.dx = 0;
      input.dy = 0;
      mouseTarget = null;
    } else {
      const dx = mouseTarget.x - px;
      const dy = mouseTarget.y - py;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 10) {
        input.dx = dx / dist;
        input.dy = dy / dist;
      } else {
        input.dx = 0;
        input.dy = 0;
        mouseTarget = null;
      }
    }
  }
  // 安全网：无任何输入源时强制清零
  if (!joystickActive && !mouseTarget &&
      !keys['w'] && !keys['s'] && !keys['a'] && !keys['d'] &&
      !keys['arrowup'] && !keys['arrowdown'] && !keys['arrowleft'] && !keys['arrowright']) {
    input.dx = 0;
    input.dy = 0;
  }
}

// ===== 玩家移动 =====
function updatePlayer() {
  if (gameOver) return;
  
  // 移动
  px += input.dx * PLAYER_SPEED;
  py += input.dy * PLAYER_SPEED;
  
  // 边界
  px = Math.max(20, Math.min(FIELD_W - 40, px));
  py = Math.max(67, Math.min(FIELD_H - 47, py));
  
  // 带球跟随
  if (hasBall && !ballMoving) {
    bx = px;
    by = py + 67;
  }
  
  // 射门冷却
  if (shootCooldown > 0) shootCooldown--;
  if (defenderKickCooldown > 0) defenderKickCooldown--;
  
  // 射门
  if (input.shoot && hasBall && shootCooldown === 0) {
    doShoot();
    input.shoot = false;
  }
}

// ===== 射门 =====
function doShoot() {
  hasBall = false;
  ballMoving = true;
  shootCooldown = 30;
  mouseTarget = null;  // 射门后清除鼠标目标，防止持续自动移动
  input.dx = 0; input.dy = 0;  // 同时清除输入方向
  
  // 计算射门方向（基于当前移动方向或默认向上）
  let sx = input.dx;
  let sy = input.dy;
  
  if (Math.abs(sx) < 0.1 && Math.abs(sy) < 0.1) {
    // 默认向上射门（朝向球门）
    sx = 0;
    sy = -1;
  }
  
  // 归一化
  const len = Math.sqrt(sx * sx + sy * sy);
  sx /= len;
  sy /= len;
  
  bvx = sx * BALL_SPEED;
  bvy = sy * BALL_SPEED;
  
  dbgEl.textContent = '射门!';
}

// ===== 足球物理 =====
function updateBall() {
  if (!ballMoving) return;
  
  // 移动
  bx += bvx;
  by += bvy;
  
  // 摩擦力
  bvx *= BALL_FRICTION;
  bvy *= BALL_FRICTION;
  
  // 边界反弹（左右）- 更强力反弹
  if (bx < 15) {
    bvx = Math.abs(bvx) * 0.8 + 1;
    bx = 15;
  }
  if (bx > FIELD_W - 15) {
    bvx = -Math.abs(bvx) * 0.8 - 1;
    bx = FIELD_W - 15;
  }
  // 顶部边界（球门外区域反弹，球门区域内不反弹让球进门）
  if (by < 15 && !(bx > 100 && bx < 260 && by > -10)) {
    bvy = Math.abs(bvy) * 0.8 + 1;
    by = 15;
  }
  // 底部边界
  if (by > FIELD_H - 15) {
    bvy = -Math.abs(bvy) * 0.8 - 1;
    by = FIELD_H - 15;
  }
  
  // 停止检测
  const speed = Math.sqrt(bvx * bvx + bvy * bvy);
  if (speed < 0.3) {
    ballMoving = false;
    bvx = 0;
    bvy = 0;
  }
  
  // 添加拖尾
  if (speed > 2 && Math.random() > 0.5) {
    addTrail(bx, by);
  }
}

function addTrail(x, y) {
  const trail = document.createElement('div');
  trail.className = 'trail';
  // 拖尾也需要考虑摄像机偏移
  trail.style.left = (x - 7 - camera.x) + 'px';
  trail.style.top = (y - 7 - camera.y) + 'px';
  document.getElementById('field').appendChild(trail);
  
  // 移除旧的拖尾
  setTimeout(() => trail.remove(), 200);
}

// ===== AI更新 =====
function updateAI() {
  // 守门员巡逻
  keeperX += keeperDir * KEEPER_SPEED * 0.5;
  if (keeperX < 100) keeperDir = 1;
  if (keeperX > 260) keeperDir = -1;
  
  // 如果球在上半区，守门员上前
  if (by < 200) {
    const targetX = bx;
    keeperX += (targetX - keeperX) * 0.05;
  }
  
  // 守门员边界
  keeperX = Math.max(100, Math.min(260, keeperX));
}

// ===== 防守球员AI =====
const DEFENDER_ZONE = 220; // 每个防守球员的活动半径
const DEFENDER_CHASE_SPEED = 3; // 追球速度（更积极）
const DEFENDER_RETURN_SPEED = 1.5; // 回防速度

function updateDefenders() {
  if (gameOver) return;
  
  // 选出距离球最近的3个（且在活动区域内）作为追球手
  const defDists = defenders.map((def, i) => {
    const dx = bx - def.x;
    const dy = by - def.y;
    const distH = Math.sqrt((def.x - def.homeX) ** 2 + (def.y - def.homeY) ** 2);
    return { idx: i, dist: Math.sqrt(dx * dx + dy * dy), inZone: distH < DEFENDER_ZONE };
  });
  defDists.sort((a, b) => a.dist - b.dist);
  const chaserSet = new Set();
  for (let k = 0; k < Math.min(3, defDists.length); k++) {
    if (defDists[k].dist < 300 && defDists[k].inZone) {
      chaserSet.add(defDists[k].idx);
    }
  }
  
  defenders.forEach((def, i) => {
    const dxHome = def.x - def.homeX;
    const dyHome = def.y - def.homeY;
    const distHome = Math.sqrt(dxHome * dxHome + dyHome * dyHome);
    
    if (def.hasBall) {
      // 截到球了，向玩家半场方向踢出（解围）
      const kickDir = Math.atan2(py - def.y, px - def.x);
      bvx = Math.cos(kickDir) * BALL_SPEED * 1.2;
      bvy = Math.sin(kickDir) * BALL_SPEED * 1.2;
      defenderKickCooldown = 30;  // 解围后冷却
      ballMoving = true;
      def.hasBall = false;
      dbgEl.textContent = `防守球员${i + 1}解围!`;
    } else if (chaserSet.has(i)) {
      // 追球手 → 积极追球
      const dxBall = bx - def.x;
      const dyBall = by - def.y;
      const distBall = Math.sqrt(dxBall * dxBall + dyBall * dyBall);
      if (distBall > 1) {
        def.x += (dxBall / distBall) * DEFENDER_CHASE_SPEED;
        def.y += (dyBall / distBall) * DEFENDER_CHASE_SPEED;
      }
    } else if (distHome > 8) {
      // 非追球手 → 回防
      def.x -= (dxHome / distHome) * DEFENDER_RETURN_SPEED * 1.2;
      def.y -= (dyHome / distHome) * DEFENDER_RETURN_SPEED * 1.2;
    } else {
      // 在家附近巡逻
      const t = Date.now() * 0.001;
      def.x += Math.sin(t * 2 + i * 1.7) * 1.2;
      def.y += Math.cos(t * 1.5 + i * 2.1) * 0.8;
    }
    
    // 边界
    def.x = Math.max(20, Math.min(FIELD_W - 50, def.x));
    def.y = Math.max(53, Math.min(FIELD_H - 47, def.y));
  });
}

// ===== 碰撞检测 =====
function checkCollisions() {
  const playerRadius = 25;
  const ballRadius = 10;
  const defenderRadius = 22;
  const keeperRadius = 25;
  
  // 玩家捡球
  if (!hasBall && !ballMoving) {
    const dx = px + 30 - bx;
    const dy = py + 65 - by;
    if (dx * dx + dy * dy < 900) {
      hasBall = true;
      dbgEl.textContent = '拿到球了!';
    }
  }
  
  // 防守球员截球
  if (ballMoving) {
    defenders.forEach((def, i) => {
      const dx = def.x + 22 - bx;
      const dy = def.y + 32 - by;
      if (dx * dx + dy * dy < (defenderRadius + ballRadius) ** 2) {
        // 截球成功
        if (defenderKickCooldown > 0) return;  // 冷却中不截球
        def.hasBall = true;
        ballMoving = false;
        bvx = 0;
        bvy = 0;
        bx = def.x + 22;
        by = def.y + 32;
        defenderKickCooldown = 30;  // 30帧冷却
        dbgEl.textContent = `防守球员${i + 1}截球!`;
      }
    });
    
    // 守门员扑球
    if (!ballMoving && defenderKickCooldown <= 0) {  // 冷却中不扑球
      const kdx = keeperX + 25 - bx;
      const kdy = keeperY + 35 - by;
      if (kdx * kdx + kdy * kdy < (keeperRadius + ballRadius) ** 2) {
        // 守门员扑出！球向随机方向弹回（朝中场方向）
        const angle = (Math.random() - 0.5) * Math.PI * 0.8; // -72°到72°的随机角度
        const speed = 5 + Math.random() * 2; // 5-7px/帧
        
        bvx = Math.sin(angle) * speed;
        bvy = Math.cos(angle) * speed; // 向下弹（朝中场）
        ballMoving = true;
        
        dbgEl.textContent = '守门员扑出！球弹回！';
      }
    }
  }
  
  // 玩家和守门员碰撞
  {
    const dx = px + 30 - (keeperX + 25);
    const dy = py + 65 - (keeperY + 35);
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = playerRadius + keeperRadius;
    if (dist < minDist && dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist + 2;
      px += nx * overlap * 0.7;
      py += ny * overlap * 0.7;
      keeperX -= nx * overlap * 0.3;
      keeperY -= ny * overlap * 0.3;
    }
  }
  
  // 玩家和防守球员碰撞（双向推开）
  defenders.forEach((def) => {
    const dx = px + 30 - (def.x + 22);
    const dy = py + 65 - (def.y + 32);
    const dist = Math.sqrt(dx * dx + dy * dy);
    const minDist = playerRadius + defenderRadius;
    if (dist < minDist && dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist + 2;
      px += nx * overlap * 0.7;
      py += ny * overlap * 0.7;
      def.x -= nx * overlap * 0.3;
      def.y -= ny * overlap * 0.3;
    }
  });
  
  // 防守球员之间保持距离（互相推开，力度加大）
  const DEFENDER_MIN_GAP = 70; // 防守球员之间最小间距
  for (let i = 0; i < defenders.length; i++) {
    for (let j = i + 1; j < defenders.length; j++) {
      const def1 = defenders[i];
      const def2 = defenders[j];
      
      const dx = def1.x - def2.x;
      const dy = def1.y - def2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      
      if (dist < DEFENDER_MIN_GAP) {
        const safeDist = Math.max(dist, 1);
        const nx = dx / safeDist;
        const ny = dy / safeDist;
        const overlap = DEFENDER_MIN_GAP - dist + 3;
        def1.x += nx * overlap * 0.5;
        def1.y += ny * overlap * 0.5;
        def2.x -= nx * overlap * 0.5;
        def2.y -= ny * overlap * 0.5;
      }
    }
  }
  
  // 玩家边界修正
  px = Math.max(20, Math.min(FIELD_W - 40, px));
  py = Math.max(67, Math.min(FIELD_H - 47, py));
  
  // 防守球员边界修正
  defenders.forEach(def => {
    def.x = Math.max(20, Math.min(FIELD_W - 50, def.x));
    def.y = Math.max(200, Math.min(FIELD_H - 70, def.y));
  });
}

// ===== 进球检测 =====
function checkGoal() {
  if (gameOver) return;
  
  // 球在球门区域（x:220-420, y:0-53）且靠近顶部
  if (bx > 100 && bx < 260 && by < 40 && by > 10) {
    gameWin();
    return;
  }
  
  // 球出界重置
  if (by < -50 || by > FIELD_H + 50 || bx < -50 || bx > FIELD_W + 50) {
    bx = px;
    by = py + 67;
    ballMoving = false;
    bvx = 0;
    bvy = 0;
    hasBall = true;
    dbgEl.textContent = '球出界，重新发球';
  }
  // 球停下且离玩家太远，自动回传（加大距离阈值，避免射门后立刻回传）
  if (!hasBall && !ballMoving && shootCooldown <= 0) {
    const dx2 = px + 30 - bx;
    const dy2 = py + 65 - by;
    const distToPlayer = Math.sqrt(dx2 * dx2 + dy2 * dy2);
    if (distToPlayer > 250) {
      bx = px;
      by = py + 67;
      hasBall = true;
      dbgEl.textContent = '球自动回传';
    }
  }
}

function gameWin() {
  running = false;
  gameOver = true;
  
  // 保存成绩到排行榜
  const name = document.getElementById('player-name').textContent || '神秘球员';
  const record = {
    name: name,
    time: elapsed,
    date: new Date().toISOString().split('T')[0]
  };
  saveToLeaderboard(record);
  
  // 先播放庆祝动画，再显示结果界面
  playCelebration(() => {
    endScreen.className = 'win';
    document.getElementById('end-title').textContent = '🎉 进球!';
    document.getElementById('end-msg').textContent = `恭喜 ${name} 进球！用时 ${elapsed}秒`;
    showLeaderboard();
    endScreen.style.display = 'flex';
  });
  
  dbgEl.textContent = '胜利!';
}

function gameLose() {
  running = false;
  gameOver = true;
  
  // 显示失败界面（不记录排行榜）
  endScreen.className = 'lose';
  document.getElementById('end-title').textContent = '⏱️ 时间到!';
  document.getElementById('end-msg').textContent = '很遗憾，时间到未能进球';
  document.getElementById('leaderboard').innerHTML = '';
  
  endScreen.style.display = 'flex';
  dbgEl.textContent = '失败';
}

// ===== 排行榜 =====
// 共享排行榜：优先从API读取，失败降级localStorage
let sharedLBCache = null;
let sharedLBLoading = false;

async function fetchSharedLeaderboard() {
  if (sharedLBLoading) return;
  sharedLBLoading = true;
  try {
    const resp = await fetch(SHARED_LB_API);
    if (resp.ok) {
      const data = await resp.json();
      sharedLBCache = data.leaderboard || [];
      // 同步到localStorage作为缓存
      try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(sharedLBCache)); } catch(e) {}
    }
  } catch(e) {
    // 网络失败，用localStorage缓存
  }
  sharedLBLoading = false;
}

function getLeaderboard() {
  if (sharedLBCache) return sharedLBCache;
  try {
    const data = localStorage.getItem(LEADERBOARD_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    return [];
  }
}

async function saveToLeaderboard(record) {
  try {
    let leaderboard = getLeaderboard();
    leaderboard.push(record);
    // 按用时升序排列
    leaderboard.sort((a, b) => a.time - b.time);
    // 最多保留MAX_LEADERBOARD条
    if (leaderboard.length > MAX_LEADERBOARD) {
      leaderboard = leaderboard.slice(0, MAX_LEADERBOARD);
    }
    // 更新缓存
    sharedLBCache = leaderboard;
    // 保存到localStorage
    try { localStorage.setItem(LEADERBOARD_KEY, JSON.stringify(leaderboard)); } catch(e) {}
    // 异步推送到共享API（带冲突重试）
    pushSharedLB(leaderboard);
  } catch (e) {
    console.error('保存排行榜失败:', e);
  }
}

// 推送排行榜到共享API
async function pushSharedLB(leaderboard, retryCount) {
  retryCount = retryCount || 0;
  try {
    const resp = await fetch(SHARED_LB_API, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ leaderboard: leaderboard })
    });
    if (resp.ok) {
      showLeaderboard();  // 推送成功刷新显示
    } else if (retryCount < 2) {
      await fetchSharedLeaderboard();
      const merged = mergeLeaderboard(getLeaderboard(), leaderboard);
      sharedLBCache = merged;
      pushSharedLB(merged, retryCount + 1);
    }
  } catch(e) {}
}

function mergeLeaderboard(existing, newdata) {
  const map = new Map();
  [...existing, ...newdata].forEach(r => {
    const key = r.name + '|' + r.time + '|' + r.date;
    if (!map.has(key)) map.set(key, r);
  });
  const merged = Array.from(map.values());
  merged.sort((a, b) => a.time - b.time);
  return merged.slice(0, MAX_LEADERBOARD);
}

function showLeaderboard() {
  fetchSharedLeaderboard();  // 刷新共享数据
  const leaderboard = getLeaderboard();
  const displayList = leaderboard.slice(0, DISPLAY_LEADERBOARD);
  
  if (displayList.length === 0) {
    document.getElementById('leaderboard').innerHTML = '<p style="color:#888;text-align:center">暂无记录</p>';
    return;
  }
  
  let html = '<table><thead><tr><th>排名</th><th>姓名</th><th>用时</th><th>日期</th></tr></thead><tbody>';
  displayList.forEach((record, i) => {
    html += `<tr><td>${i + 1}</td><td>${record.name}</td><td>${record.time}秒</td><td>${record.date}</td></tr>`;
  });
  html += '</tbody></table>';
  
  document.getElementById('leaderboard').innerHTML = html;
}

// ===== 计时器 =====
function updateTimer() {
  elapsed = Math.floor((performance.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
  const s = (elapsed % 60).toString().padStart(2, '0');
  timerEl.textContent = m + ':' + s;
  
  // 超时检测
  if (elapsed >= MAX_GAME_TIME && !gameOver) {
    gameLose();
  }
}

// ===== 渲染 =====
let playerSpriteEl;
let runFrame = 0;
let runTimer = 0;

function render() {
  // 玩家位置
  playerEl.style.left = (px - camera.x) + 'px';
  playerEl.style.top = (py - camera.y) + 'px';
  
  // 玩家贴图动画：根据移动方向选择对应朝向贴图
  const isMoving = Math.abs(input.dx) > 0.15 || Math.abs(input.dy) > 0.15;
  if (isMoving) {
    runTimer++;
    if (runTimer % 7 === 0) { // 每7帧切换，3帧动画更丝滑
      runFrame = (runFrame + 1) % 3;
    }
    // 方向判断：有上就背面，有下就正面，纯左右用背面+翻转
    if (input.dy < -0.15) {
      // 有向上 = 背面
      playerSpriteEl.src = runFrame===1 ? SPRITE_BACK2 : SPRITE_BACK1;
      playerSpriteEl.style.transform = '';
    } else if (input.dy > 0.15) {
      // 有向下 = 正面
      playerSpriteEl.src = runFrame===1 ? SPRITE_RUN2 : SPRITE_RUN1;
      playerSpriteEl.style.transform = '';
    } else {
      // 纯左右 = 侧面，右向翻转
      playerSpriteEl.src = runFrame===0?SPRITE_SIDE1:runFrame===1?SPRITE_SIDE2:SPRITE_SIDE3;
      playerSpriteEl.style.transform = input.dx > 0 ? 'scaleX(-1)' : '';
    }
  } else {
    playerSpriteEl.src = SPRITE_IDLE;
    playerSpriteEl.style.transform = '';
    runFrame = 0;
    runTimer = 0;
  }
  
  // 足球
  ballEl.style.left = (bx - camera.x) + 'px';
  ballEl.style.top = (by - camera.y) + 'px';
  
  // 守门员（轻微抖动模拟站立微动）
  const kj = Math.sin(runTimer * 0.15) * 1.2;
  keeperEl.style.left = (keeperX - camera.x + kj * 0.5) + 'px';
  keeperEl.style.top = (keeperY - camera.y + Math.abs(kj) * 0.3) + 'px';
  
  // 防守球员（各自轻微抖动，不同相位）
  defenderEls.forEach((el, i) => {
    const phase = i * 1.7;
    const jx = Math.sin(runTimer * 0.13 + phase) * 1.0;
    const jy = Math.cos(runTimer * 0.11 + phase) * 0.8;
    el.style.left = (defenders[i].x - camera.x + jx) + 'px';
    el.style.top = (defenders[i].y - camera.y + jy) + 'px';
  });
  
  // 方向提示
  const hintEl = document.getElementById('direction-hint');
  if (hasBall) {
    const dir = getDirectionName(input.dx, input.dy);
    hintEl.textContent = dir ? `方向: ${dir}` : '向上射门';
  } else {
    hintEl.textContent = '';
  }
}

function getDirectionName(dx, dy) {
  if (Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) return '';
  if (Math.abs(dx) > Math.abs(dy)) {
    return dx > 0 ? '右' : '左';
  } else {
    return dy > 0 ? '下' : '上';
  }
}

// ===== 渲染场地（考虑摄像机） =====
function renderField() {
  // 草地背景
  fieldBg.style.transform = `translate(${-camera.x}px, ${-camera.y}px)`;
  
  // 中场线
  midline.style.top = (FIELD_H / 2 - camera.y) + 'px';
  midline.style.left = (-camera.x) + 'px';
  
  // 中圈
  midcircle.style.top = (FIELD_H / 2 - 80 - camera.y) + 'px';
  midcircle.style.left = (FIELD_W / 2 - 80 - camera.x) + 'px';
  
  // 禁区
  penaltyEl.style.top = (0 - camera.y) + 'px';
  penaltyEl.style.left = (FIELD_W / 2 - 187 - camera.x) + 'px';
  
  // 球门
  goalArea.style.top = (0 - camera.y) + 'px';
  goalArea.style.left = (FIELD_W / 2 - 100 - camera.x) + 'px';
}

// ===== 调试面板 =====
function updateDebug() {
  dbgEl.textContent = 
    `cam:${Math.round(camera.x)},${Math.round(camera.y)} ` +
    `pos:${Math.round(px)},${Math.round(py)} ` +
    `ball:${Math.round(bx)},${Math.round(by)} ` +
    `hasBall:${hasBall} moving:${ballMoving} ` +
    `elapsed:${elapsed}s`;
}

// ===== 抽奖 =====
const LOTTERY_USED_KEY = 'arc_shooter_lottery_used';
const LOTTERY_PHONE_KEY = 'arc_shooter_lottery_phones';

function doLottery() {
  const btn = document.getElementById('lottery-btn');
  const resultEl = document.getElementById('lottery-result');
  
  // 设备限制：每台设备只能抽一次
  if (localStorage.getItem(LOTTERY_USED_KEY)) {
    resultEl.className = 'third';
    resultEl.style.display = 'block';
    resultEl.textContent = '您已抽过奖';
    btn.disabled = true;
    btn.textContent = '🎰 已抽奖';
    return;
  }
  
  // 手机号限制：同一手机号只能抽一次
  const phone = document.getElementById('phone-input')?.value?.trim();
  if (phone) {
    let phones = JSON.parse(localStorage.getItem(LOTTERY_PHONE_KEY) || '[]');
    if (phones.includes(phone)) {
      resultEl.className = 'third';
      resultEl.style.display = 'block';
      resultEl.textContent = '该手机号已抽过奖';
      btn.disabled = true;
      btn.textContent = '🎰 已抽奖';
      return;
    }
    phones.push(phone);
    localStorage.setItem(LOTTERY_PHONE_KEY, JSON.stringify(phones));
  }
  
  // 标记本设备已抽奖
  localStorage.setItem(LOTTERY_USED_KEY, '1');
  btn.disabled = true;
  
  // 概率抽奖
  const rand = Math.random() * 100;
  let cls, text;
  
  if (rand < 0.01) {
    cls = 'special';
    text = '🎉 特等奖！';
  } else if (rand < 0.11) {
    cls = 'first';
    text = '🎊 一等奖！';
  } else if (rand < 1.11) {
    cls = 'second';
    text = '✨ 二等奖！';
  } else {
    cls = 'third';
    text = '🎈 三等奖！';
  }
  
  // 闪烁动画后显示结果
  let flicker = 0;
  const flickerInterval = setInterval(() => {
    btn.style.opacity = flicker % 2 === 0 ? '0.4' : '1';
    flicker++;
    if (flicker >= 8) {
      clearInterval(flickerInterval);
      btn.style.opacity = '1';
      resultEl.className = cls;
      resultEl.style.display = 'block';
      resultEl.textContent = text;
      btn.textContent = '🎰 已抽奖';
    }
  }, 120);
}
